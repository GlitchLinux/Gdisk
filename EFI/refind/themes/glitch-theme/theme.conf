
# Glitch Theme Configuration
# /EFI/BOOT/themes/glitch-theme/theme.conf

# Hide UI elements for clean look
hideui singleuser,hints,arrows,badges

# Background wallpaper - using bg.png as full screen background
banner themes/glitch-theme/bg.png
#banner_scale fillscreen

# Icon directories and selection images
icons_dir themes/glitch-theme/icons
selection_big themes/glitch-theme/icons/selection_large.png
selection_small themes/glitch-theme/icons/selection_small.png

# Icon sizes
#small_icon_size 80
#big_icon_size 130

#resolution 1280 720