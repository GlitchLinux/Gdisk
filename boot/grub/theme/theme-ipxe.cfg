title-text: "Gdisk NetBoot ~ iPXE"
title-font: "Sans Bold 28"
title-color: "#FFFFFF"
desktop-color: "#000000"
desktop-image: "/boot/grub/theme/.ipxe.png"
message-font: "Sans Regular 20"
message-color: "#FFFFFF"
message-bg-color: "#000000"
terminal-font: "Sans Regular 20"

+ boot_menu {
    left = 10%
    top = 20%
    width = 80%
    height = 60%
    item_font = "Sans Bold 28"
    item_color = "#878787"
    selected_item_color = "#FFFFFF"
    item_height = 40
    item_padding = 15
    item_spacing = 8
    item_icon_space = 15
}

# Footer information
+ vbox {
    top = 95%
    left = 2%
    + label {
        text = "Created by: https://github.com/glitchlinux"
        font = "Sans Bold 24"
        color = "#ffffff"
        align = "center"
    }
}