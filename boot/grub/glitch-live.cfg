# ╔════════════════════════════════╗
# ║  Gdisk v2.0 - LINUX LIVE BOOT  ║
# ╚════════════════════════════════╝

if loadfont /boot/grub/font.pf2 ; then
    set gfxmode=auto
    insmod gfxterm
    insmod video_bochs
    insmod video_cirrus
    terminal_output gfxterm
fi
insmod png
background_image -m stretch /boot/grub/theme/grub.png
set timeout=5
set default=0
set theme=/boot/grub/theme/theme-linux-live.cfg
set color_normal=white/black
set color_highlight=white/black

### Live Boot Entries ###

menuentry "Glitch Linux - Live" {
    linux /glitch-live/vmlinuz boot=live live-media-path=/glitch-live config quiet splash
    initrd /glitch-live/initrd.img
}
menuentry "Glitch Linux - Boot to RAM" {
    linux /glitch-live/vmlinuz boot=live live-media-path=/glitch-live config quiet splash toram=filesystem.squashfs
    initrd /glitch-live/initrd.img
}
menuentry "Glitch Linux - Encrypted Persistence" {
    linux /glitch-live/vmlinuz boot=live live-media-path=/glitch-live components quiet splash persistent=cryptsetup persistence-encryption=luks persistence
    initrd /glitch-live/initrd.img
}
menuentry "Glitch Linux - Unencrypted Persistence" {
    linux /glitch-live/vmlinuz boot=live live-media-path=/glitch-live components quiet splash persistence
    initrd /glitch-live/initrd.img
}
menuentry "Glitch Linux - Boot to RAM with Encrypted Persistence" {
    linux /glitch-live/vmlinuz boot=live live-media-path=/glitch-live components quiet splash toram=filesystem.squashfs persistent=cryptsetup persistence-encryption=luks persistence
    initrd /glitch-live/initrd.img
}
menuentry "[←]" {
    configfile /boot/grub/grub.cfg
}