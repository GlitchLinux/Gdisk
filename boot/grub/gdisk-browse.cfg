# ╔════════════════════════════════════════════╗
# ║         Gdisk - Directory Browser          ║
# ║  Explores filesystem, launches boot menus  ║
# ╚════════════════════════════════════════════╝
#
# Variables expected (exported by caller):
#   gdisk_browse_dev  = "hd0,gpt2"
#   gdisk_browse_path = "/some/path" or "" for root

insmod regexp
insmod probe

# ── Build full prefix ──
set gdisk_prefix="(${gdisk_browse_dev})${gdisk_browse_path}"

# ── Theme / Display ──
set timeout=-1
set default=0
set theme=/boot/grub/theme/theme-gdisk.cfg
set color_normal=white/black
set color_highlight=cyan/black

# ── Header ──
probe --set=dlabel --label "(${gdisk_browse_dev})"
probe --set=dfs -f "(${gdisk_browse_dev})"
if [ -z "${dlabel}" ]; then
    set dlabel="${gdisk_browse_dev}"
fi

if [ -n "${gdisk_browse_path}" ]; then
    set display_path="${gdisk_browse_path}"
else
    set display_path="/"
fi

echo ""
echo "  [${dlabel}] (${gdisk_browse_dev}) - ${dfs}"
echo "  Path: ${display_path}"
echo ""

# ═══════════════════════════════════════
#  [..] Go up one level
# ═══════════════════════════════════════
if [ -n "${gdisk_browse_path}" ]; then
    menuentry "[..] Up" "${gdisk_browse_dev}" "${gdisk_browse_path}" {
        set gdisk_browse_dev="${2}"
        regexp --set=gdisk_browse_path '^(.*)/[^/]+$' "${3}"
        export gdisk_browse_dev
        export gdisk_browse_path
        configfile /boot/grub/gdisk-browse.cfg
    }
fi

# ═══════════════════════════════════════
#  List directories first
# ═══════════════════════════════════════
for entry in ${gdisk_prefix}/*; do
    if [ -d "${entry}" ]; then
        regexp --set=entryname '.*/([^/]+)$' "${entry}"
        if [ -n "${entryname}" ]; then
            if regexp '^\..*' "${entryname}"; then
                true
            elif [ "${entryname}" = "System Volume Information" ]; then
                true
            elif [ "${entryname}" = "$RECYCLE.BIN" ]; then
                true
            else
                menuentry "[DIR] ${entryname}" "${gdisk_browse_dev}" "${gdisk_browse_path}" "${entryname}" {
                    set gdisk_browse_dev="${2}"
                    set gdisk_browse_path="${3}/${4}"
                    export gdisk_browse_dev
                    export gdisk_browse_path
                    configfile /boot/grub/gdisk-browse.cfg
                }
            fi
        fi
    fi
done

# ═══════════════════════════════════════
#  .iso files -> iso-preboot.cfg
# ═══════════════════════════════════════
for entry in ${gdisk_prefix}/*.iso ${gdisk_prefix}/*.ISO; do
    if [ -f "${entry}" ]; then
        regexp --set=entryname '.*/([^/]+)$' "${entry}"
        if [ -n "${entryname}" ]; then
            menuentry "[ISO] ${entryname}" "${gdisk_browse_dev}" "${gdisk_browse_path}" "${entryname}" {
                set gdisk_dev="${2}"
                set gdisk_path="${3}/${4}"
                set gdisk_file="(${2})${3}/${4}"
                export gdisk_file
                export gdisk_path
                export gdisk_dev
                configfile /boot/grub/iso-preboot.cfg
            }
        fi
    fi
done

# ═══════════════════════════════════════
#  .img files -> img-preboot.cfg
# ═══════════════════════════════════════
for entry in ${gdisk_prefix}/*.img ${gdisk_prefix}/*.IMG; do
    if [ -f "${entry}" ]; then
        regexp --set=entryname '.*/([^/]+)$' "${entry}"
        if [ -n "${entryname}" ]; then
            menuentry "[IMG] ${entryname}" "${gdisk_browse_dev}" "${gdisk_browse_path}" "${entryname}" {
                set gdisk_dev="${2}"
                set gdisk_path="${3}/${4}"
                set gdisk_file="(${2})${3}/${4}"
                export gdisk_file
                export gdisk_path
                export gdisk_dev
                configfile /boot/grub/img-preboot.cfg
            }
        fi
    fi
done

# ═══════════════════════════════════════
#  .wim files -> wim-preboot.cfg
# ═══════════════════════════════════════
for entry in ${gdisk_prefix}/*.wim ${gdisk_prefix}/*.WIM; do
    if [ -f "${entry}" ]; then
        regexp --set=entryname '.*/([^/]+)$' "${entry}"
        if [ -n "${entryname}" ]; then
            menuentry "[WIM] ${entryname}" "${gdisk_browse_dev}" "${gdisk_browse_path}" "${entryname}" {
                set gdisk_dev="${2}"
                set gdisk_path="${3}/${4}"
                set gdisk_file="(${2})${3}/${4}"
                export gdisk_file
                export gdisk_path
                export gdisk_dev
                configfile /boot/grub/wim-preboot.cfg
            }
        fi
    fi
done

# ═══════════════════════════════════════
#  .vtoy files -> direct boot
# ═══════════════════════════════════════
for entry in ${gdisk_prefix}/*.vtoy; do
    if [ -f "${entry}" ]; then
        regexp --set=entryname '.*/([^/]+)$' "${entry}"
        if [ -n "${entryname}" ]; then
            if [ "${grub_platform}" = "efi" ]; then
                menuentry "[VTOY] ${entryname}" "${gdisk_browse_path}" "${entryname}" {
                    set vpath="${2}/${3}"
                    insmod chain
                    chainloader /boot/grub/vdiskchain/vdiskchain vdisk=${vpath}
                    boot
                }
            fi
            if [ "${grub_platform}" = "pc" ]; then
                menuentry "[VTOY] ${entryname}" "${gdisk_browse_path}" "${entryname}" {
                    set vpath="${2}/${3}"
                    search --file --set=root /boot/grub/vdiskchain/vdisk.krn
                    linux16 /boot/grub/vdiskchain/vdisk.krn vdisk=${vpath}
                    initrd16 /boot/grub/vdiskchain/vdiskchain
                    boot
                }
            fi
        fi
    fi
done

# ═══════════════════════════════════════
#  .efi files -> chainload
# ═══════════════════════════════════════
if [ "${grub_platform}" = "efi" ]; then
    for entry in ${gdisk_prefix}/*.efi ${gdisk_prefix}/*.EFI; do
        if [ -f "${entry}" ]; then
            regexp --set=entryname '.*/([^/]+)$' "${entry}"
            if [ -n "${entryname}" ]; then
                menuentry "[EFI] ${entryname}" "${gdisk_browse_dev}" "${gdisk_browse_path}" "${entryname}" {
                    insmod chain
                    chainloader "(${2})${3}/${4}"
                }
            fi
        fi
    done
fi

# ═══════════════════════════════════════
#  .cfg files -> configfile
# ═══════════════════════════════════════
for entry in ${gdisk_prefix}/*.cfg; do
    if [ -f "${entry}" ]; then
        regexp --set=entryname '.*/([^/]+)$' "${entry}"
        if [ -n "${entryname}" ]; then
            menuentry "[CFG] ${entryname}" "${gdisk_browse_dev}" "${gdisk_browse_path}" "${entryname}" {
                configfile "(${2})${3}/${4}"
            }
        fi
    fi
done

# ═══════════════════════════════════════
menuentry "[<-] Back to Gdisk Menu" {
    configfile /boot/grub/gdisk-boot.cfg
}
