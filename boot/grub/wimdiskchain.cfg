# ╔════════════════════════════════════════════════════╗
# ║  wimDiskChain - Dynamic WIM Boot Menu              ║
# ║  Auto-scans all partitions for .wim files          ║
# ║                                                    ║
# ║  Uses wimdiskchain (embedded Ventoy + WIM boot)    ║
# ║  for BIOS, GrubFM wimboot module for UEFI         ║
# ║                                                    ║
# ║  Place this as /boot/grub/wimdiskchain.cfg         ║
# ║  Reference from main grub.cfg with:                ║
# ║    menuentry "wimDiskChain - WIM Booting" {        ║
# ║        configfile /boot/grub/wimdiskchain.cfg      ║
# ║    }                                               ║
# ╚════════════════════════════════════════════════════╝

insmod regexp
insmod probe

# ── Theme / Display ──
if loadfont /boot/grub/font.pf2 ; then
    set gfxmode=auto
    insmod gfxterm
    terminal_output gfxterm
fi
insmod png
if [ -f /boot/grub/theme/grub.png ]; then
    background_image -m stretch /boot/grub/theme/grub.png
fi

set theme=/boot/grub/theme/theme-gdisk.cfg
set timeout=15
set default=0
set color_normal=white/black
set color_highlight=white/black

# ── Scan all partitions for .wim files ──
for disk in 0 1 2 3 4 5 6 7; do
    for partnum in 1 2 3 4 5 6 7 8; do
        for partscheme in gpt msdos; do
            set trypart="(hd${disk},${partscheme}${partnum})"

            if [ -d "${trypart}/" ]; then

                # ── Scan root of partition ──
                for wimfile in ${trypart}/*.wim ${trypart}/*.WIM; do
                    if [ -f "${wimfile}" ]; then
                        regexp --set=1:wim_path '^\([^)]+\)(.+)$' "${wimfile}"
                        regexp --set=1:wim_basename '/([^/]+)$' "${wim_path}"
                        regexp --set=1:wim_dev '^\(([^)]+)\)' "${wimfile}"

                        if [ "${grub_platform}" = "efi" ]; then
                            menuentry "[UEFI] ${wim_basename}  [${trypart}]" "${wimfile}" "${wim_path}" "${wim_dev}" {
                                insmod xzio
                                insmod wimboot
                                insmod loopback
                                set lang=en_US
                                terminal_output console
                                loopback wimboot /boot/grub/wimboot/wimboot.xz
                                wimboot --rawwim --testmode=no \
                                        @:bootmgfw.efi:(wimboot)/bootmgfw.efi \
                                        @:boot.wim:"${2}"
                            }
                        fi

                        if [ "${grub_platform}" = "pc" ]; then
                            menuentry "[BIOS] ${wim_basename}  [${trypart}]" "${wim_path}" {
                                search --file --set=root /boot/grub/wimdiskchain/wdisk.krn
                                linux16 /boot/grub/wimdiskchain/wdisk.krn wdisk=${2}
                                initrd16 /boot/grub/wimdiskchain/wimdiskchain
                                boot
                            }
                        fi
                    fi
                done

                # ── Scan one directory deep ──
                for subdir in ${trypart}/*/; do
                    if [ -d "${subdir}" ]; then
                        for wimfile in ${subdir}*.wim ${subdir}*.WIM; do
                            if [ -f "${wimfile}" ]; then
                                regexp --set=1:wim_path '^\([^)]+\)(.+)$' "${wimfile}"
                                regexp --set=1:wim_basename '/([^/]+)$' "${wim_path}"
                                regexp --set=1:wim_dev '^\(([^)]+)\)' "${wimfile}"

                                if [ "${grub_platform}" = "efi" ]; then
                                    menuentry "[UEFI] ${wim_basename}  [${trypart}]" "${wimfile}" "${wim_path}" "${wim_dev}" {
                                        insmod xzio
                                        insmod wimboot
                                        insmod loopback
                                        set lang=en_US
                                        terminal_output console
                                        loopback wimboot /boot/grub/wimboot/wimboot.xz
                                        wimboot --rawwim --testmode=no \
                                                @:bootmgfw.efi:(wimboot)/bootmgfw.efi \
                                                @:boot.wim:"${2}"
                                    }
                                fi

                                if [ "${grub_platform}" = "pc" ]; then
                                    menuentry "[BIOS] ${wim_basename}  [${trypart}]" "${wim_path}" {
                                        search --file --set=root /boot/grub/wimdiskchain/wdisk.krn
                                        linux16 /boot/grub/wimdiskchain/wdisk.krn wdisk=${2}
                                        initrd16 /boot/grub/wimdiskchain/wimdiskchain
                                        boot
                                    }
                                fi
                            fi
                        done
                    fi
                done

            fi
        done
    done
done

menuentry "[<-] Back to Main Menu" {
    configfile /boot/grub/grub.cfg
}
