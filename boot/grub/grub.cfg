# ╔════════════════════════════════════════╗
# ║    Gdisk-fat32 v3.0 - Multibooter      ║
# ║  Browse ~ Boot ~ iPXE ~ Live Systems   ║
# ╚════════════════════════════════════════╝

if loadfont /boot/grub/font.pf2 ; then
    set gfxmode=auto
    insmod gfxterm
    insmod video_bochs
    insmod video_cirrus
    terminal_output gfxterm
fi

insmod png
background_image -m stretch /boot/grub/theme/grub.png

# ═══════════════════════════════════════
#  AUTO FONT SIZE DETECTION BY RESOLUTION
# ═══════════════════════════════════════

# Detect screen resolution and set fonts accordingly
# gfxmode format: WIDTHxHEIGHT
# Extract width and assign appropriate theme

if [ "${gfxmode}" = "auto" ]; then
    # If auto mode, assume reasonable FHD (1920x1080)
    set gdisk_theme=/boot/grub/theme/theme-56.cfg
else
    # Parse gfxmode to get width for dynamic font scaling
    # gfxmode typically: 1920x1080, 2560x1440, 3840x2160, etc.
    
    # Check if resolution is QHD (2560px) or higher
    if [ "${gfxmode}" = "2560x1440" ] || [ "${gfxmode}" = "2560x1600" ]; then
        set gdisk_theme=/boot/grub/theme/theme-64.cfg
    # Check if resolution is 4K (3840px+)
    elif [ "${gfxmode}" = "3840x2160" ] || [ "${gfxmode}" = "4096x2160" ]; then
        set gdisk_theme=/boot/grub/theme/theme-72.cfg
    # Check if resolution is ultrawide 3440+ (5K/ultrawide)
    elif [ "${gfxmode}" = "3440x1440" ] || [ "${gfxmode}" = "5120x1440" ]; then
        set gdisk_theme=/boot/grub/theme/theme-72.cfg
    # FHD (1920x1080, 1920x1200) and below
    elif [ "${gfxmode}" = "1920x1080" ] || [ "${gfxmode}" = "1920x1200" ] || [ "${gfxmode}" = "1920x1440" ]; then
        set gdisk_theme=/boot/grub/theme/theme-56.cfg
    # Fallback for other resolutions
    else
        set gdisk_theme=/boot/grub/theme/theme-56.cfg
    fi
fi

set theme=${gdisk_theme}
set timeout=10
set default=0
set color_normal=white/black
set color_highlight=white/black

# ═══════════════════════════════════════
#  Primary: Browse & Boot
# ═══════════════════════════════════════

menuentry "Gdisk Browse Partitions" {
    configfile /boot/grub/gdisk-partitions.cfg
}

# ═══════════════════════════════════════
#  Live Systems (auto-detected)
# ═══════════════════════════════════════

if [ -f /glitch-live/filesystem.squashfs ]; then
    menuentry "Glitch Linux Live Boot" {
        configfile /boot/grub/glitch-live.cfg
    }
fi

if [ -f /bonsai-live/filesystem.squashfs ]; then
    menuentry "Bonsai Linux Live Boot" {
        configfile /boot/grub/bonsai-live.cfg
    }
fi

if [ -f /live/filesystem.squashfs ]; then
    menuentry "Linux Live System Boot" {
        configfile /boot/grub/linux-live.cfg
    }
fi

menuentry "Gdisk Quickboot Files" {
    configfile /boot/grub/gdisk-boot.cfg
}

# ═══════════════════════════════════════
#  Windows PE / Installers
# ═══════════════════════════════════════

if [ -d /boot/grub/winpe-iso/ ]; then
    menuentry "WindowsPE ISO Tools" {
         configfile /boot/grub/winpe-iso.cfg
    }
fi

if [ -f /Wim/boot.wim ]; then
    menuentry "WinPE Native Boot" {
         configfile /boot/grub/winpe-native.cfg
    }
fi

# ═══════════════════════════════════════
#  Disk Image Loaders
# ═══════════════════════════════════════

if [ -f /boot/grub/vdiskchain/vdiskchain ]; then
    menuentry "VdiskChain Load OS" {
        configfile /boot/grub/vdiskchain.cfg
    }
fi

# ═══════════════════════════════════════
#  Network & Chainloaders
# ═══════════════════════════════════════

if [ "${grub_platform}" = "efi" ]; then
    menuentry "WimDiskChain WIM" {
        configfile /boot/grub/wimdiskchain.cfg
    }
    menuentry "iPXE Multiboot" {
        configfile /boot/grub/grub-ipxe.cfg
    }
    menuentry "Gdisk Ventoy" {
        map -f "/boot/grub/images/Gdisk-2.0-Ventoy.img"
    }
    menuentry "rEFInd UEFI" --class refind {
        insmod part_gpt
        insmod fat
        insmod chain
        search --file --no-floppy --set=root /EFI/refind/bootx64.efi
        chainloader /EFI/refind/bootx64.efi
    }
    menuentry "agFM UEFI" {
        chainloader /EFI/grubfm/grubfmx64.efi
    }
fi

if [ "${grub_platform}" = "pc" ]; then
    menuentry "iPXE Multiboot" {
        configfile /boot/grub/grub-ipxe.cfg
    }
    menuentry "Gdisk Ventoy" {
        linux16 /boot/grub/images/memdisk img
        initrd16 /boot/grub/images/Gdisk-2.0-Ventoy.img
        boot
    }
    menuentry "loadFM Bios" {
       linux16 /boot/grub/agFM/loadfm
       boot
    }
    menuentry "agFM BIOS" --class grubfm {
        insmod multiboot
        multiboot /boot/grub/agFM/agFM.elf
        boot
    }
fi

# ═══════════════════════════════════════
#  System
# ═══════════════════════════════════════

menuentry "System" {
    configfile /boot/grub/system.cfg
}
