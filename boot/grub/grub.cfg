# ╔════════════════════════════════════════╗
# ║    Gdisk-fat32 v2.0 - Multibooter      ║
# ║  rEFInd ~ agFM ~ iPXE ~ ISO Scanner    ║
# ║ Gdiskchain ~ Vtoy ~ WinPe ~ Linux-Live ║
# ╚════════════════════════════════════════╝

if loadfont /boot/grub/font.pf2 ; then
    set gfxmode=auto
    insmod gfxterm
    insmod video_bochs
    insmod video_cirrus
    terminal_output gfxterm
fi
insmod png
background_image -m stretch /boot/grub/theme/grub.png
set timeout=10
set default=0
set theme=/boot/grub/theme/theme.cfg
set color_normal=white/black
set color_highlight=white/black

if [ -f /glitch-live/filesystem.squashfs ]; then
    menuentry "Glitch Linux Live Boot" {
        configfile /boot/grub/glitch-live.cfg
    }
fi

if [ -f /bonsai-live/filesystem.squashfs ]; then
    menuentry "Bonsai Linux Live Boot" {
        configfile /boot/grub/bonsai-live.cfg
    }
fi

if [ -f /live/filesystem.squashfs ]; then
    menuentry "Linux Live System Boot" {
        configfile /boot/grub/linux-live.cfg
    }
fi

if [ -f /boot/grub/vdiskchain/vdiskchain ]; then
    menuentry "VdiskChain OS Loader" {
        configfile /boot/grub/vdiskchain.cfg
    }
fi

menuentry "Gdisk Scan & Boot" {
    configfile /boot/grub/gdisk-boot.cfg
}

if [ -d /boot/grub/winpe-iso/ ]; then
    menuentry "WindowsPE ISO Tools" {
         configfile /boot/grub/winpe-iso.cfg
    }
fi

if [ -f /Wim/boot.wim ]; then
    menuentry "WinPE Native Boot" {
         configfile /boot/grub/winpe-native.cfg
    }
fi

### UEFI-Only Boot Entries ###

if [ "${grub_platform}" = "efi" ]; then
    menuentry "iPXE Multiboot" {
        configfile /boot/grub/grub-ipxe.cfg
    }
    menuentry "Gdisk Ventoy" {
        map -f "/boot/grub/images/Gdisk-2.0-Ventoy.img"
    }    
    menuentry "rEFInd UEFI" --class refind {
        insmod part_gpt
        insmod fat
        insmod chain
        search --file --no-floppy --set=root /EFI/refind/bootx64.efi
        chainloader /EFI/refind/bootx64.efi
    }
    menuentry "agFM UEFI" {
        chainloader /EFI/grubfm/grubfmx64.efi
    }

fi
### BIOS-Only Boot Entries ###

if [ "${grub_platform}" = "pc" ]; then  
    menuentry "iPXE Multiboot" {
        configfile /boot/grub/grub-ipxe.cfg
    }
    menuentry "Gdisk Ventoy" {
	linux16 /boot/grub/images/memdisk img
        initrd16 /boot/grub/images/Gdisk-2.0-Ventoy.img
	boot
    } 
    menuentry "loadFM Bios" {
       linux16 /boot/grub/agFM/loadfm
       boot
    }
    menuentry "agFM BIOS" --class grubfm {
        insmod multiboot
        multiboot /boot/grub/agFM/agFM.elf
        boot
    }
fi

### System Controls ###

menuentry "System" {
    configfile /boot/grub/system.cfg
}
