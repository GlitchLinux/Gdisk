if loadfont /boot/grub/font.pf2 ; then
    set gfxmode=auto
    insmod gfxterm
    insmod video_bochs
    insmod video_cirrus
    terminal_output gfxterm
fi

insmod png

background_image /boot/grub/theme/.ipxe.png

set theme=/boot/grub/theme/theme-ipxe.cfg
set timeout=10
set default=0

# Detect boot mode
if [ "${grub_platform}" == "efi" ]; then
    set boot_mode="UEFI"
else
    set boot_mode="BIOS"
fi

if [ "${grub_platform}" == "efi" ]; then
menuentry "Glitch Multiboot iPXE [UEFI]" {
    insmod part_msdos
    insmod fat
    chainloader /EFI/iPXE/Glitch-iPXE.efi
}
else
    menuentry "Glitch Multiboot iPXE [BIOS]" {
        insmod part_msdos
        insmod fat
        linux16 /boot/grub/images/memdisk iso
        initrd16 /boot/grub/images/gLiTcH-iPXE.iso
    }
fi

if [ "${grub_platform}" == "efi" ]; then
menuentry "Gdisk-v3.iso iPXE [UEFI]" {
    insmod part_msdos
    insmod fat
    chainloader /EFI/iPXE/Gdisk-v3-iPXE.EFI
}
else
    menuentry "Gdisk-v3.iso iPXE [BIOS]" {
        insmod part_msdos
        insmod fat
        linux16 /boot/grub/images/memdisk iso
        initrd16 /boot/grub/images/Gdisk-v3-iPXE.iso
    }
fi

if [ "${grub_platform}" == "efi" ]; then
menuentry "Gdisk Installer iPXE [UEFI]" {
    insmod part_msdos
    insmod fat
    chainloader /EFI/iPXE/Gdisk-Installer-v2.0-iPXE.efi
}
else
    menuentry "Gdisk Installer iPXE [BIOS]" {
        insmod part_msdos
        insmod fat
        linux16 /boot/grub/images/memdisk iso
        initrd16 /boot/grub/images/Gdisk-Installer-v2.0-iPXE.iso
    }
fi

menuentry "[←]" {
    configfile /boot/grub/grub.cfg
}
