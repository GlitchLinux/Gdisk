# ╔═══════════════════════════════════════════════╗
# ║  Gdisk - Browse Partitions                    ║
# ║  Select a partition to explore its filesystem  ║
# ╚═══════════════════════════════════════════════╝

set timeout=-1
set default=0
set theme=/boot/grub/theme/theme-gdisk.cfg
set color_normal=white/black
set color_highlight=cyan/black

insmod regexp
insmod probe
insmod fat
insmod exfat
insmod ntfs
insmod ext2
insmod part_gpt
insmod part_msdos

echo ""
echo "  Scanning for partitions..."
echo ""

for disk in 0 1 2 3 4 5 6 7; do
    for partnum in 1 2 3 4 5 6; do
        for partscheme in gpt msdos; do
            set trydev="hd${disk},${partscheme}${partnum}"
            if [ -d "(${trydev})/" ]; then
                probe --set=plabel --label "(${trydev})"
                probe --set=pfs -f "(${trydev})"
                if [ -z "${plabel}" ]; then
                    set plabel="${trydev}"
                fi
                menuentry "[${pfs}] ${plabel} (${trydev})" "${trydev}" {
                    set gdisk_browse_dev="${2}"
                    set gdisk_browse_path=""
                    export gdisk_browse_dev
                    export gdisk_browse_path
                    configfile /boot/grub/gdisk-browse.cfg
                }
            fi
        done
    done
done

menuentry "[<-] Back to Main Menu" {
    configfile /boot/grub/grub.cfg
}
