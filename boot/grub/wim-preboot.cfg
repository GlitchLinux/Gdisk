# ╔═══════════════════════════════════════════════╗
# ║  Gdisk - WIM Pre-Boot Menu                    ║
# ║  Analyzes .wim files, offers boot methods      ║
# ╚═══════════════════════════════════════════════╝
#
# Variables expected (exported by caller):
#   gdisk_file  = "(hd0,gpt2)/Wim/boot.wim"
#   gdisk_path  = "/Wim/boot.wim"
#   gdisk_dev   = "hd0,gpt2"
#
# UEFI: GrubFM wimboot module (bootmgfw.efi from wimboot.xz)
# BIOS: wimdiskchain (embedded Ventoy image with WIM boot default)

# ── Load required modules ──
insmod regexp
insmod loopback
insmod chain
insmod fat
insmod ntfs
insmod xzio

# ── Extract filename for display ──
regexp --set=gdisk_name '.*/(.*)$' "${gdisk_file}"
if [ -z "${gdisk_name}" ]; then
    set gdisk_name="${gdisk_path}"
fi

# ── Theme / Display ──
set timeout=-1
set default=0
set theme=/boot/grub/theme/theme-gdisk.cfg
set color_normal=white/black
set color_highlight=cyan/black

# ── Wimboot files directory ──
set wb="/boot/grub/wimboot"
set wc="/boot/grub/wimdiskchain"

# ═══════════════════════════════════════
#  Detect available boot infrastructure
# ═══════════════════════════════════════

# GrubFM wimboot module (UEFI): needs wimboot.xz
set has_grubfm_wimboot=0
if [ -f ${wb}/wimboot.xz ]; then
    set has_grubfm_wimboot=1
fi

# GrubFM install.xz (optional)
set has_install_xz=0
if [ -f ${wb}/install.xz ]; then
    set has_install_xz=1
fi

# wimdiskchain (BIOS + UEFI): embedded Ventoy with WIM default
set has_wimdiskchain=0
if [ -f ${wc}/wimdiskchain ]; then
    set has_wimdiskchain=1
fi

set has_wdisk_krn=0
if [ -f ${wc}/wdisk.krn ]; then
    set has_wdisk_krn=1
fi

# ═══════════════════════════════════════
#  Display Header
# ═══════════════════════════════════════
echo ""
echo "  Gdisk Pre-Boot: ${gdisk_name}"
echo "  Type: Windows Imaging Format (WIM)"
if [ "${has_grubfm_wimboot}" = "1" ]; then
    echo "  UEFI wimboot: Ready"
fi
if [ "${has_wimdiskchain}" = "1" ]; then
    echo "  wimdiskchain: Ready"
fi
echo ""

# ═══════════════════════════════════════
#  UEFI Boot Methods
# ═══════════════════════════════════════

if [ "${grub_platform}" = "efi" ]; then

    # ── GrubFM wimboot module (primary UEFI) ──
    if [ "${has_grubfm_wimboot}" = "1" ]; then
        menuentry "[UEFI] WIM Boot (wimboot)" "${gdisk_file}" {
            insmod xzio
            insmod wimboot
            insmod loopback
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            wimboot --rawwim --testmode=no \
                    @:bootmgfw.efi:(wimboot)/bootmgfw.efi \
                    @:boot.wim:"${2}"
        }
    fi

    # ── GrubFM wimboot + install tools ──
    if [ "${has_grubfm_wimboot}" = "1" -a "${has_install_xz}" = "1" ]; then
        menuentry "[UEFI] WIM Boot + Install Tools" "${gdisk_file}" {
            insmod xzio
            insmod wimboot
            insmod loopback
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            loopback install /boot/grub/wimboot/install.xz
            wimboot --testmode=no \
                    @:bootmgfw.efi:(wimboot)/bootmgfw.efi \
                    @:mount_x64.exe:(install)/mount_x64.exe \
                    @:mount_x86.exe:(install)/mount_x86.exe \
                    @:start.bat:(install)/start.bat \
                    @:winpeshl.ini:(install)/winpeshl.ini \
                    @:boot.wim:"${2}"
        }
    fi

    # ── GrubFM ntboot module ──
    if [ "${has_grubfm_wimboot}" = "1" ]; then
        menuentry "[UEFI] WIM Boot (ntboot)" "${gdisk_file}" {
            insmod xzio
            insmod ntboot
            insmod loopback
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            ntboot --testmode=no --efi=(wimboot)/bootmgfw.efi "${2}"
        }
    fi

    # ── wimdiskchain UEFI fallback ──
    if [ "${has_wimdiskchain}" = "1" ]; then
        menuentry "[UEFI] WIM Boot (wimdiskchain)" "${gdisk_path}" {
            insmod chain
            chainloader /boot/grub/wimdiskchain/wimdiskchain vdisk=${2}
        }
    fi

fi

# ═══════════════════════════════════════
#  BIOS Boot Methods
# ═══════════════════════════════════════

if [ "${grub_platform}" = "pc" ]; then

    # ── wimdiskchain BIOS (primary) ──
    # Boots an embedded Ventoy image configured for WIM default.
    # Ventoy handles the full WIM boot chain internally using
    # ipxe.krn + vt_wim_chain_data - the proven method.
    if [ "${has_wimdiskchain}" = "1" -a "${has_wdisk_krn}" = "1" ]; then
        menuentry "[BIOS] WIM Boot (wimdiskchain)" "${gdisk_path}" {
            search --file --set=root /boot/grub/wimdiskchain/wdisk.krn
            linux16 /boot/grub/wimdiskchain/wdisk.krn vdisk=${2}
            initrd16 /boot/grub/wimdiskchain/wimdiskchain
            boot
        }
    fi

fi

# ── Back ──
menuentry "[<-] Back" {
    configfile /boot/grub/gdisk-boot.cfg
}
