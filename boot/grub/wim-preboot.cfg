# ╔═══════════════════════════════════════════╗
# ║  Gdisk - WIM Pre-Boot Menu                ║
# ║  Analyzes .wim files, offers boot methods ║
# ╚═══════════════════════════════════════════╝
#
# Variables expected (exported by caller):
#   gdisk_file  = "(hd0,gpt2)/Wim/boot.wim"
#   gdisk_path  = "/Wim/boot.wim"
#   gdisk_dev   = "hd0,gpt2"
#
# Boot methods:
#   1. wimboot module (GrubFM) - UEFI, uses bootmgfw.efi from wimboot.xz
#   2. ntboot module (GrubFM)  - UEFI, direct NT boot
#   3. iPXE wimboot binary     - BIOS+UEFI, uses bootmgr/BCD/boot.sdi
#   4. WinPE Native chainload  - BIOS+UEFI, uses installed bootmgr

# ── Load required modules ──
insmod regexp
insmod loopback
insmod chain
insmod fat
insmod ntfs

# ── Extract filename for display ──
regexp --set=gdisk_name '.*/(.*\.[wW][iI][mM])$' "${gdisk_file}"
if [ -z "${gdisk_name}" ]; then
    set gdisk_name="${gdisk_path}"
fi

# ── Theme / Display ──
set timeout=-1
set default=0
set theme=/boot/grub/theme/theme-gdisk.cfg
set color_normal=white/black
set color_highlight=cyan/black

# ═══════════════════════════════════════
#  Detect available boot infrastructure
# ═══════════════════════════════════════

# GrubFM wimboot module: needs wimboot.xz (contains bootmgfw.efi)
set has_grubfm_wimboot=0
if [ -f /boot/grub/wimboot/wimboot.xz ]; then
    set has_grubfm_wimboot=1
fi

# GrubFM ntboot module: needs wimboot.xz for the EFI binary
set has_ntboot=0
if [ -f /boot/grub/wimboot/wimboot.xz ]; then
    set has_ntboot=1
fi

# iPXE wimboot binary: needs wimboot + bootmgr + BCD + boot.sdi
set has_ipxe_wimboot=0
set wb_dir="/boot/grub/wimboot"
if [ -f "${wb_dir}/wimboot" ]; then
    if [ -f "${wb_dir}/BCD" -a -f "${wb_dir}/boot.sdi" ]; then
        set has_ipxe_wimboot=1
    fi
fi

# Check for bootmgr variants (BIOS vs UEFI)
set has_bootmgr=0
set has_bootmgr_efi=0
if [ -f "${wb_dir}/bootmgr" ]; then
    set has_bootmgr=1
fi
if [ -f "${wb_dir}/bootmgr.efi" ]; then
    set has_bootmgr_efi=1
fi

# WinPE native chainload (bootmgr installed at root)
set has_native_uefi=0
set has_native_bios=0
if [ -f /EFI/microsoft/boot/BOOTX64.EFI -a -f /EFI/microsoft/boot/bcd ]; then
    set has_native_uefi=1
fi
if [ -f /boot/bootmgr -a -f /boot/bcd ]; then
    set has_native_bios=1
fi

# GrubFM install.xz (contains mount tools + start.bat for ISO installer)
set has_install_xz=0
if [ -f /boot/grub/wimboot/install.xz ]; then
    set has_install_xz=1
fi

# ═══════════════════════════════════════
#  Display Header
# ═══════════════════════════════════════
echo ""
echo "  Gdisk Pre-Boot: ${gdisk_name}"
echo "  Type: Windows Imaging Format (WIM)"
if [ "${has_grubfm_wimboot}" = "1" ]; then
    echo "  wimboot.xz: Found"
fi
if [ "${has_ipxe_wimboot}" = "1" ]; then
    echo "  iPXE wimboot: Found"
fi
echo ""

# ═══════════════════════════════════════
#  Build Dynamic Boot Menu
# ═══════════════════════════════════════

# ── Option 1: GrubFM wimboot module (UEFI) ──
# Uses the wimboot GRUB command with bootmgfw.efi from wimboot.xz
# This is the primary GrubFM method - most compatible for WinPE
if [ "${grub_platform}" = "efi" ]; then
    if [ "${has_grubfm_wimboot}" = "1" ]; then
        menuentry "[UEFI] WIM Boot (wimboot module)" "${gdisk_file}" {
            insmod wimboot
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            wimboot --rawwim --testmode=no \
                    @:bootmgfw.efi:(wimboot)/bootmgfw.efi \
                    @:boot.wim:"${2}"
        }
    fi
fi

# ── Option 2: GrubFM wimboot + install tools (ISO installer mode) ──
# Adds mount_x64/x86.exe + start.bat + winpeshl.ini from install.xz
# For booting WinPE that needs to mount an ISO for Windows installation
if [ "${grub_platform}" = "efi" ]; then
    if [ "${has_grubfm_wimboot}" = "1" -a "${has_install_xz}" = "1" ]; then
        menuentry "[UEFI] WIM Boot + Install Tools (wimboot module)" "${gdisk_file}" {
            insmod wimboot
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            loopback install /boot/grub/wimboot/install.xz
            wimboot --testmode=no \
                    @:bootmgfw.efi:(wimboot)/bootmgfw.efi \
                    @:mount_x64.exe:(install)/mount_x64.exe \
                    @:mount_x86.exe:(install)/mount_x86.exe \
                    @:start.bat:(install)/start.bat \
                    @:winpeshl.ini:(install)/winpeshl.ini \
                    @:boot.wim:"${2}"
        }
    fi
fi

# ── Option 3: GrubFM ntboot module (UEFI) ──
# Direct NT boot - simpler, fewer dependencies
if [ "${grub_platform}" = "efi" ]; then
    if [ "${has_ntboot}" = "1" ]; then
        menuentry "[UEFI] WIM Boot (ntboot module)" "${gdisk_file}" {
            insmod ntboot
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            ntboot --testmode=no --efi=(wimboot)/bootmgfw.efi "${2}"
        }
    fi
fi

# ── Option 4: iPXE wimboot binary (UEFI) ──
# Uses the iPXE wimboot Linux binary with newc: cpio initrd syntax
if [ "${grub_platform}" = "efi" ]; then
    if [ "${has_ipxe_wimboot}" = "1" -a "${has_bootmgr_efi}" = "1" ]; then
        menuentry "[UEFI] WIM Boot (iPXE wimboot)" "${gdisk_file}" {
            linux ${wb_dir}/wimboot
            initrd \
                newc:bootmgr:${wb_dir}/bootmgr.efi \
                newc:bcd:${wb_dir}/BCD \
                newc:boot.sdi:${wb_dir}/boot.sdi \
                newc:boot.wim:"${2}"
            boot
        }
    fi
fi

# ── Option 5: iPXE wimboot binary (BIOS) ──
if [ "${grub_platform}" = "pc" ]; then
    if [ "${has_ipxe_wimboot}" = "1" -a "${has_bootmgr}" = "1" ]; then
        menuentry "[BIOS] WIM Boot (iPXE wimboot)" "${gdisk_file}" {
            linux16 ${wb_dir}/wimboot
            initrd16 \
                newc:bootmgr:${wb_dir}/bootmgr \
                newc:bcd:${wb_dir}/BCD \
                newc:boot.sdi:${wb_dir}/boot.sdi \
                newc:boot.wim:"${2}"
            boot
        }
    fi
fi

# ── Option 6: Raw UEFI map ──
# Map the WIM as a disk image - unlikely to work but available
if [ "${grub_platform}" = "efi" ]; then
    menuentry "[UEFI] Raw Boot - map -f (experimental)" "${gdisk_file}" {
        map -f "${2}"
    }
fi

# ── Option 7: WinPE Native chainload (pre-installed bootmgr) ──
# Requires boot.wim to be at the path the BCD expects (usually /Wim/boot.wim)
if [ "${grub_platform}" = "efi" -a "${has_native_uefi}" = "1" ]; then
    menuentry "[UEFI] WinPE Native Chainload (bootmgr)" {
        insmod chain
        chainloader /EFI/microsoft/boot/BOOTX64.EFI
    }
fi

if [ "${grub_platform}" = "pc" -a "${has_native_bios}" = "1" ]; then
    menuentry "[BIOS] WinPE Native Chainload (bootmgr)" {
        insmod ntldr
        ntldr /boot/bootmgr
    }
fi

# ── Info: what's needed ──
if [ "${has_grubfm_wimboot}" = "0" -a "${has_ipxe_wimboot}" = "0" -a "${has_native_uefi}" = "0" -a "${has_native_bios}" = "0" ]; then
    menuentry "-- No WIM boot tools found --" {
        echo ""
        echo "  To boot .wim files, populate /boot/grub/wimboot/ with:"
        echo ""
        echo "  For GrubFM wimboot module (recommended UEFI):"
        echo "    wimboot.xz     - from grub2-filemanager arch/x64/"
        echo "    install.xz     - (optional) for ISO installer mode"
        echo ""
        echo "  For iPXE wimboot (BIOS + UEFI):"
        echo "    wimboot         - iPXE wimboot binary"
        echo "    bootmgr         - Windows Boot Manager (BIOS)"
        echo "    bootmgr.efi     - Windows Boot Manager (UEFI)"
        echo "    BCD             - Boot Configuration Data"
        echo "    boot.sdi        - RAMDisk template"
        echo ""
        sleep --interruptible 9999
    }
fi

# ── Back ──
menuentry "[<-] Back" {
    configfile /boot/grub/gdisk-boot.cfg
}
