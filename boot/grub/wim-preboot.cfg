# ╔═══════════════════════════════════════════════╗
# ║  Gdisk - WIM Pre-Boot Menu                    ║
# ║  Analyzes .wim files, offers boot methods      ║
# ╚═══════════════════════════════════════════════╝
#
# Variables expected (exported by caller):
#   gdisk_file  = "(hd0,gpt2)/Wim/boot.wim"
#   gdisk_path  = "/Wim/boot.wim"
#   gdisk_dev   = "hd0,gpt2"

# ── Load required modules ──
insmod regexp
insmod loopback
insmod chain
insmod fat
insmod ntfs
insmod xzio

# ── Extract filename for display ──
regexp --set=gdisk_name '.*/(.*)$' "${gdisk_file}"
if [ -z "${gdisk_name}" ]; then
    set gdisk_name="${gdisk_path}"
fi

# ── Theme / Display ──
set timeout=-1
set default=0
set theme=/boot/grub/theme/theme-gdisk.cfg
set color_normal=white/black
set color_highlight=cyan/black

# ═══════════════════════════════════════
#  Detect available boot infrastructure
# ═══════════════════════════════════════

set has_grubfm_wimboot=0
if [ -f /boot/grub/wimboot/wimboot.xz ]; then
    set has_grubfm_wimboot=1
fi

set has_install_xz=0
if [ -f /boot/grub/wimboot/install.xz ]; then
    set has_install_xz=1
fi

# Detect boot device for BIOS drive swap
regexp --set=bootdev '^([^,]+)' "${gdisk_dev}"

# ═══════════════════════════════════════
#  Display Header
# ═══════════════════════════════════════
echo ""
echo "  Gdisk Pre-Boot: ${gdisk_name}"
echo "  Type: Windows Imaging Format (WIM)"
if [ "${has_grubfm_wimboot}" = "1" ]; then
    echo "  wimboot.xz: Found"
fi
echo ""

# ═══════════════════════════════════════
#  UEFI Boot Methods
# ═══════════════════════════════════════

if [ "${grub_platform}" = "efi" ]; then

    # ── GrubFM wimboot module (UEFI) ──
    if [ "${has_grubfm_wimboot}" = "1" ]; then
        menuentry "[UEFI] WIM Boot (wimboot)" "${gdisk_file}" {
            insmod xzio
            insmod wimboot
            insmod loopback
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            wimboot --rawwim --testmode=no \
                    @:bootmgfw.efi:(wimboot)/bootmgfw.efi \
                    @:boot.wim:"${2}"
        }
    fi

    # ── GrubFM wimboot + install tools (UEFI) ──
    if [ "${has_grubfm_wimboot}" = "1" -a "${has_install_xz}" = "1" ]; then
        menuentry "[UEFI] WIM Boot + Install Tools (wimboot)" "${gdisk_file}" {
            insmod xzio
            insmod wimboot
            insmod loopback
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            loopback install /boot/grub/wimboot/install.xz
            wimboot --testmode=no \
                    @:bootmgfw.efi:(wimboot)/bootmgfw.efi \
                    @:mount_x64.exe:(install)/mount_x64.exe \
                    @:mount_x86.exe:(install)/mount_x86.exe \
                    @:start.bat:(install)/start.bat \
                    @:winpeshl.ini:(install)/winpeshl.ini \
                    @:boot.wim:"${2}"
        }
    fi

    # ── GrubFM ntboot module (UEFI) ──
    if [ "${has_grubfm_wimboot}" = "1" ]; then
        menuentry "[UEFI] WIM Boot (ntboot)" "${gdisk_file}" {
            insmod xzio
            insmod ntboot
            insmod loopback
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            ntboot --testmode=no --efi=(wimboot)/bootmgfw.efi "${2}"
        }
    fi

fi

# ═══════════════════════════════════════
#  BIOS Boot Methods
# ═══════════════════════════════════════

if [ "${grub_platform}" = "pc" ]; then

    # ── GrubFM wimboot module + drive swap (BIOS) ──
    # The wimboot module embeds its own iPXE wimboot binary and
    # generates BCD/boot.sdi in memory. The key fix for BIOS is
    # swapping hd0/hd1 so Windows bootmgr doesn't find the Gdisk
    # MBR and reboot back into GRUB.
    if [ "${has_grubfm_wimboot}" = "1" ]; then
        menuentry "[BIOS] WIM Boot (wimboot + drive swap)" "${gdisk_file}" "${bootdev}" {
            insmod xzio
            insmod wimboot
            insmod loopback
            # Swap USB drive out of hd0 position so Windows bootmgr
            # doesn't chainload the Gdisk MBR instead of booting WinPE
            if [ "${3}" = "hd0" ]; then
                map -s (hd0) (hd1)
            fi
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            wimboot --rawwim --testmode=no \
                    @:bootmgfw.efi:(wimboot)/bootmgfw.efi \
                    @:boot.wim:"${2}"
        }
    fi

    # ── GrubFM wimboot + install tools + drive swap (BIOS) ──
    if [ "${has_grubfm_wimboot}" = "1" -a "${has_install_xz}" = "1" ]; then
        menuentry "[BIOS] WIM Boot + Install Tools (wimboot + drive swap)" "${gdisk_file}" "${bootdev}" {
            insmod xzio
            insmod wimboot
            insmod loopback
            if [ "${3}" = "hd0" ]; then
                map -s (hd0) (hd1)
            fi
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            loopback install /boot/grub/wimboot/install.xz
            wimboot --testmode=no \
                    @:bootmgfw.efi:(wimboot)/bootmgfw.efi \
                    @:mount_x64.exe:(install)/mount_x64.exe \
                    @:mount_x86.exe:(install)/mount_x86.exe \
                    @:start.bat:(install)/start.bat \
                    @:winpeshl.ini:(install)/winpeshl.ini \
                    @:boot.wim:"${2}"
        }
    fi

    # ── GrubFM ntboot module + drive swap (BIOS) ──
    if [ "${has_grubfm_wimboot}" = "1" ]; then
        menuentry "[BIOS] WIM Boot (ntboot + drive swap)" "${gdisk_file}" "${bootdev}" {
            insmod xzio
            insmod ntboot
            insmod loopback
            if [ "${3}" = "hd0" ]; then
                map -s (hd0) (hd1)
            fi
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            ntboot --testmode=no --efi=(wimboot)/bootmgfw.efi "${2}"
        }
    fi

fi

# ═══════════════════════════════════════
#  Back
# ═══════════════════════════════════════
menuentry "[<-] Back" {
    configfile /boot/grub/gdisk-boot.cfg
}
