# ╔═══════════════════════════════════════════════╗
# ║  Gdisk - WIM Pre-Boot Menu                    ║
# ║  Analyzes .wim files, offers boot methods      ║
# ╚═══════════════════════════════════════════════╝
#
# Variables expected (exported by caller):
#   gdisk_file  = "(hd0,gpt2)/Wim/boot.wim"
#   gdisk_path  = "/Wim/boot.wim"
#   gdisk_dev   = "hd0,gpt2"

# ── Load required modules ──
insmod regexp
insmod loopback
insmod chain
insmod fat
insmod ntfs
insmod xzio

# ── Extract filename for display ──
regexp --set=gdisk_name '.*/(.*)$' "${gdisk_file}"
if [ -z "${gdisk_name}" ]; then
    set gdisk_name="${gdisk_path}"
fi

# ── Theme / Display ──
set timeout=-1
set default=0
set theme=/boot/grub/theme/theme-gdisk.cfg
set color_normal=white/black
set color_highlight=cyan/black

# ═══════════════════════════════════════
#  Detect available boot infrastructure
# ═══════════════════════════════════════

set has_grubfm_wimboot=0
if [ -f /boot/grub/wimboot/wimboot.xz ]; then
    set has_grubfm_wimboot=1
fi

set has_install_xz=0
if [ -f /boot/grub/wimboot/install.xz ]; then
    set has_install_xz=1
fi

set has_initrd_img=0
if [ -f /boot/grub/wimboot/initrd.img.xz ]; then
    set has_initrd_img=1
fi

set has_grub_exe=0
if [ -f /boot/grub/images/grub.exe ]; then
    set has_grub_exe=1
fi

# iPXE wimboot binary
set wb_dir="/boot/grub/wimboot"
set has_ipxe_wimboot=0
set has_bootmgr=0
set has_bootmgr_efi=0
if [ -f "${wb_dir}/wimboot" ]; then
    if [ -f "${wb_dir}/BCD" -a -f "${wb_dir}/boot.sdi" ]; then
        set has_ipxe_wimboot=1
    fi
fi
if [ -f "${wb_dir}/bootmgr" ]; then
    set has_bootmgr=1
fi
if [ -f "${wb_dir}/bootmgr.efi" ]; then
    set has_bootmgr_efi=1
fi

# WinPE native chainload
set has_native_uefi=0
set has_native_bios=0
if [ -f /EFI/microsoft/boot/BOOTX64.EFI -a -f /EFI/microsoft/boot/bcd ]; then
    set has_native_uefi=1
fi
if [ -f /boot/bootmgr -a -f /boot/bcd ]; then
    set has_native_bios=1
fi

# ── Convert GRUB2 device to grub4dos format for BIOS NTBOOT ──
# grub2: hd0,msdos1 -> g4d: (hd0,0)
# grub2: hd0,gpt2   -> g4d: (hd0,1)
set g4d_devpath=""
if [ -n "${gdisk_dev}" ]; then
    regexp --set=g4d_disk 'hd([0-9]+)' "${gdisk_dev}"
    regexp --set=g4d_partnum '[^0-9]([0-9]+)$' "${gdisk_dev}"
    if [ -n "${g4d_disk}" -a -n "${g4d_partnum}" ]; then
        # grub4dos partitions are 0-based, GRUB2 are 1-based
        if [ "${g4d_partnum}" = "1" ]; then set g4d_pn=0; fi
        if [ "${g4d_partnum}" = "2" ]; then set g4d_pn=1; fi
        if [ "${g4d_partnum}" = "3" ]; then set g4d_pn=2; fi
        if [ "${g4d_partnum}" = "4" ]; then set g4d_pn=3; fi
        if [ "${g4d_partnum}" = "5" ]; then set g4d_pn=4; fi
        if [ "${g4d_partnum}" = "6" ]; then set g4d_pn=5; fi
        if [ -n "${g4d_pn}" ]; then
            set g4d_devpath="(hd${g4d_disk},${g4d_pn})"
        fi
    fi
fi

# ═══════════════════════════════════════
#  Display Header
# ═══════════════════════════════════════
echo ""
echo "  Gdisk Pre-Boot: ${gdisk_name}"
echo "  Type: Windows Imaging Format (WIM)"
if [ "${has_grubfm_wimboot}" = "1" ]; then
    echo "  wimboot.xz: Found"
fi
if [ "${has_initrd_img}" = "1" ]; then
    echo "  NTBOOT (BIOS): Found"
fi
echo ""

# ═══════════════════════════════════════
#  UEFI Boot Methods
# ═══════════════════════════════════════

# ── GrubFM wimboot module (UEFI only) ──
if [ "${grub_platform}" = "efi" ]; then
    if [ "${has_grubfm_wimboot}" = "1" ]; then
        menuentry "[UEFI] WIM Boot (wimboot module)" "${gdisk_file}" {
            insmod xzio
            insmod wimboot
            insmod loopback
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            wimboot --rawwim --testmode=no \
                    @:bootmgfw.efi:(wimboot)/bootmgfw.efi \
                    @:boot.wim:"${2}"
        }
    fi
fi

# ── GrubFM wimboot + install tools (UEFI only) ──
if [ "${grub_platform}" = "efi" ]; then
    if [ "${has_grubfm_wimboot}" = "1" -a "${has_install_xz}" = "1" ]; then
        menuentry "[UEFI] WIM Boot + Install Tools (wimboot module)" "${gdisk_file}" {
            insmod xzio
            insmod wimboot
            insmod loopback
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            loopback install /boot/grub/wimboot/install.xz
            wimboot --testmode=no \
                    @:bootmgfw.efi:(wimboot)/bootmgfw.efi \
                    @:mount_x64.exe:(install)/mount_x64.exe \
                    @:mount_x86.exe:(install)/mount_x86.exe \
                    @:start.bat:(install)/start.bat \
                    @:winpeshl.ini:(install)/winpeshl.ini \
                    @:boot.wim:"${2}"
        }
    fi
fi

# ── GrubFM ntboot module (UEFI only) ──
if [ "${grub_platform}" = "efi" ]; then
    if [ "${has_grubfm_wimboot}" = "1" ]; then
        menuentry "[UEFI] WIM Boot (ntboot module)" "${gdisk_file}" {
            insmod xzio
            insmod ntboot
            insmod loopback
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            ntboot --testmode=no --efi=(wimboot)/bootmgfw.efi "${2}"
        }
    fi
fi

# ── iPXE wimboot (UEFI) ──
if [ "${grub_platform}" = "efi" ]; then
    if [ "${has_ipxe_wimboot}" = "1" -a "${has_bootmgr_efi}" = "1" ]; then
        menuentry "[UEFI] WIM Boot (iPXE wimboot)" "${gdisk_file}" {
            linux ${wb_dir}/wimboot
            initrd \
                newc:bootmgr:${wb_dir}/bootmgr.efi \
                newc:bcd:${wb_dir}/BCD \
                newc:boot.sdi:${wb_dir}/boot.sdi \
                newc:boot.wim:"${2}"
            boot
        }
    fi
fi

# ═══════════════════════════════════════
#  BIOS Boot Methods
# ═══════════════════════════════════════

# ── Grub4dos NTBOOT from initrd.img.xz (BIOS) ──
# This is GrubFM's native BIOS method: loads grub.exe from the
# NTBOOT floppy image, which chainloads NTBOOT with the WIM path
if [ "${grub_platform}" = "pc" ]; then
    if [ "${has_initrd_img}" = "1" -a -n "${g4d_devpath}" ]; then
        menuentry "[BIOS] WIM Boot (NTBOOT via grub4dos)" "${gdisk_path}" "${g4d_devpath}" {
            insmod xzio
            insmod loopback
            loopback -d rd
            loopback -m rd /boot/grub/wimboot/initrd.img.xz
            linux (rd)/NTBOOT.MOD/grub.exe --config-file="map --mem (rd)+1 (fd0);map --hook;(fd0)/NTBOOT pe1=${3}${2}"
            initrd (rd)
            boot
        }
    fi
fi

# ── Grub4dos NTBOOT fallback without device prefix (BIOS) ──
# Try with just the file path if device conversion failed
if [ "${grub_platform}" = "pc" ]; then
    if [ "${has_initrd_img}" = "1" ]; then
        menuentry "[BIOS] WIM Boot NTBOOT (auto-detect)" "${gdisk_path}" {
            insmod xzio
            insmod loopback
            loopback -d rd
            loopback -m rd /boot/grub/wimboot/initrd.img.xz
            linux (rd)/NTBOOT.MOD/grub.exe --config-file="map --mem (rd)+1 (fd0);map --hook;(fd0)/NTBOOT pe1=${2}"
            initrd (rd)
            boot
        }
    fi
fi

# ── iPXE wimboot (BIOS) ──
if [ "${grub_platform}" = "pc" ]; then
    if [ "${has_ipxe_wimboot}" = "1" -a "${has_bootmgr}" = "1" ]; then
        menuentry "[BIOS] WIM Boot (iPXE wimboot)" "${gdisk_file}" {
            linux16 ${wb_dir}/wimboot
            initrd16 \
                newc:bootmgr:${wb_dir}/bootmgr \
                newc:bcd:${wb_dir}/BCD \
                newc:boot.sdi:${wb_dir}/boot.sdi \
                newc:boot.wim:"${2}"
            boot
        }
    fi
fi

# ═══════════════════════════════════════
#  Platform-independent fallbacks
# ═══════════════════════════════════════

# ── WinPE Native chainload ──
if [ "${grub_platform}" = "efi" -a "${has_native_uefi}" = "1" ]; then
    menuentry "[UEFI] WinPE Native Chainload (bootmgr)" {
        insmod chain
        chainloader /EFI/microsoft/boot/BOOTX64.EFI
    }
fi

if [ "${grub_platform}" = "pc" -a "${has_native_bios}" = "1" ]; then
    menuentry "[BIOS] WinPE Native Chainload (bootmgr)" {
        insmod ntldr
        ntldr /boot/bootmgr
    }
fi

# ── Back ──
menuentry "[<-] Back" {
    configfile /boot/grub/gdisk-boot.cfg
}
