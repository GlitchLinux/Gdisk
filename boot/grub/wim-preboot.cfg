# ╔═══════════════════════════════════════════════╗
# ║  Gdisk - WIM Pre-Boot Menu                    ║
# ║  Analyzes .wim files, offers boot methods      ║
# ╚═══════════════════════════════════════════════╝
#
# Variables expected (exported by caller):
#   gdisk_file  = "(hd0,gpt2)/Gdisk/file.wim"
#   gdisk_path  = "/Gdisk/file.wim"
#   gdisk_dev   = "hd0,gpt2"
#
# UEFI: GrubFM wimboot module (bootmgfw.efi from wimboot.xz)
# BIOS: iPXE wimboot v2.7.3 + bootmgr.exe + BCD + boot.sdi
#       (from WinPE-Chainloader - proven 100% working)

# ── Load required modules ──
insmod regexp
insmod loopback
insmod chain
insmod fat
insmod ntfs
insmod xzio

# ── Extract filename for display ──
regexp --set=gdisk_name '.*/(.*)$' "${gdisk_file}"
if [ -z "${gdisk_name}" ]; then
    set gdisk_name="${gdisk_path}"
fi

# ── Theme / Display ──
set timeout=-1
set default=0
set theme=/boot/grub/theme/theme-gdisk.cfg
set color_normal=white/black
set color_highlight=cyan/black

# ── Wimboot files directory ──
set wb="/boot/grub/wimboot"

# ═══════════════════════════════════════
#  Detect available boot infrastructure
# ═══════════════════════════════════════

set has_grubfm_wimboot=0
if [ -f ${wb}/wimboot.xz ]; then
    set has_grubfm_wimboot=1
fi

set has_install_xz=0
if [ -f ${wb}/install.xz ]; then
    set has_install_xz=1
fi

set has_bios_wimboot=0
if [ -f ${wb}/wimboot -a -f ${wb}/bootmgr.exe -a -f ${wb}/BCD -a -f ${wb}/boot.sdi ]; then
    set has_bios_wimboot=1
fi

# ═══════════════════════════════════════
#  Display Header
# ═══════════════════════════════════════
echo ""
echo "  Gdisk Pre-Boot: ${gdisk_name}"
echo "  Type: Windows Imaging Format (WIM)"
if [ "${has_grubfm_wimboot}" = "1" ]; then
    echo "  UEFI wimboot: Ready"
fi
if [ "${has_bios_wimboot}" = "1" ]; then
    echo "  BIOS wimboot: Ready"
fi
echo ""

# ═══════════════════════════════════════
#  UEFI Boot Methods (GrubFM modules)
# ═══════════════════════════════════════

if [ "${grub_platform}" = "efi" ]; then

    if [ "${has_grubfm_wimboot}" = "1" ]; then
        menuentry "[UEFI] WIM Boot (wimboot)" "${gdisk_file}" {
            insmod xzio
            insmod wimboot
            insmod loopback
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            wimboot --rawwim --testmode=no \
                    @:bootmgfw.efi:(wimboot)/bootmgfw.efi \
                    @:boot.wim:"${2}"
        }
    fi

    if [ "${has_grubfm_wimboot}" = "1" -a "${has_install_xz}" = "1" ]; then
        menuentry "[UEFI] WIM Boot + Install Tools" "${gdisk_file}" {
            insmod xzio
            insmod wimboot
            insmod loopback
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            loopback install /boot/grub/wimboot/install.xz
            wimboot --testmode=no \
                    @:bootmgfw.efi:(wimboot)/bootmgfw.efi \
                    @:mount_x64.exe:(install)/mount_x64.exe \
                    @:mount_x86.exe:(install)/mount_x86.exe \
                    @:start.bat:(install)/start.bat \
                    @:winpeshl.ini:(install)/winpeshl.ini \
                    @:boot.wim:"${2}"
        }
    fi

    if [ "${has_grubfm_wimboot}" = "1" ]; then
        menuentry "[UEFI] WIM Boot (ntboot)" "${gdisk_file}" {
            insmod xzio
            insmod ntboot
            insmod loopback
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            ntboot --testmode=no --efi=(wimboot)/bootmgfw.efi "${2}"
        }
    fi

fi

# ═══════════════════════════════════════
#  BIOS Boot Method (iPXE wimboot)
# ═══════════════════════════════════════
#
# Uses iPXE wimboot v2.7.3 as linux16 bootloader with:
#   bootmgr.exe - from WinPE-Chainloader (proven working PE32)
#   BCD         - from WinPE-Chainloader (configured for \sources\boot.wim)
#   boot.sdi    - from WinPE-Chainloader (3.1MB ramdisk template)
#   boot.wim    - the selected .wim file (passed as newc:boot.wim)
#
# wimboot auto-patches the BCD to find boot.wim in the flat ramdisk
# namespace, so the BCD path \sources\boot.wim gets rewritten to boot.wim

if [ "${grub_platform}" = "pc" ]; then

    if [ "${has_bios_wimboot}" = "1" ]; then
        menuentry "[BIOS] WIM Boot (iPXE wimboot)" "${gdisk_file}" {
            set lang=en_US
            terminal_output console
            set enable_progress_indicator=1
            linux16 /boot/grub/wimboot/wimboot
            initrd16 \
                newc:bootmgr.exe:/boot/grub/wimboot/bootmgr.exe \
                newc:bcd:/boot/grub/wimboot/BCD \
                newc:boot.sdi:/boot/grub/wimboot/boot.sdi \
                newc:boot.wim:"${2}"
            boot
        }
    fi

    if [ "${has_bios_wimboot}" = "1" ]; then
        menuentry "[BIOS] WIM Boot rawbcd (iPXE wimboot)" "${gdisk_file}" {
            set lang=en_US
            terminal_output console
            set enable_progress_indicator=1
            linux16 /boot/grub/wimboot/wimboot rawbcd
            initrd16 \
                newc:bootmgr.exe:/boot/grub/wimboot/bootmgr.exe \
                newc:bcd:/boot/grub/wimboot/BCD \
                newc:boot.sdi:/boot/grub/wimboot/boot.sdi \
                newc:boot.wim:"${2}"
            boot
        }
    fi

fi

# ── Back ──
menuentry "[<-] Back" {
    configfile /boot/grub/gdisk-boot.cfg
}
