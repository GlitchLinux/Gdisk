# ╔═══════════════════════════════════════════════╗
# ║  Gdisk - WIM Pre-Boot Menu                    ║
# ║  Analyzes .wim files, offers boot methods      ║
# ╚═══════════════════════════════════════════════╝
#
# Variables expected (exported by caller):
#   gdisk_file  = "(hd0,gpt2)/Wim/boot.wim"
#   gdisk_path  = "/Wim/boot.wim"
#   gdisk_dev   = "hd0,gpt2"
#
# UEFI: GrubFM wimboot/ntboot module + bootmgfw.efi from wimboot.xz
# BIOS: iPXE wimboot binary + bootmgr.exe from common_bootmgr.xz
#       + BCD from common_bcd.xz (Ventoy method)

# ── Load required modules ──
insmod regexp
insmod loopback
insmod chain
insmod fat
insmod ntfs
insmod xzio

# ── Extract filename for display ──
regexp --set=gdisk_name '.*/(.*)$' "${gdisk_file}"
if [ -z "${gdisk_name}" ]; then
    set gdisk_name="${gdisk_path}"
fi

# ── Theme / Display ──
set timeout=-1
set default=0
set theme=/boot/grub/theme/theme-gdisk.cfg
set color_normal=white/black
set color_highlight=cyan/black

# ═══════════════════════════════════════
#  Detect available boot infrastructure
# ═══════════════════════════════════════

# GrubFM wimboot module (UEFI): needs wimboot.xz with bootmgfw.efi
set has_grubfm_wimboot=0
if [ -f /boot/grub/wimboot/wimboot.xz ]; then
    set has_grubfm_wimboot=1
fi

# GrubFM install.xz (optional ISO installer tools)
set has_install_xz=0
if [ -f /boot/grub/wimboot/install.xz ]; then
    set has_install_xz=1
fi

# Ventoy-style BIOS wimboot: needs wimboot binary + bootmgr + BCD
set has_ventoy_wimboot=0
if [ -f /boot/grub/wimboot/wimboot.x86_64.xz ]; then
    if [ -f /boot/grub/wimboot/common_bootmgr.xz ]; then
        if [ -f /boot/grub/wimboot/common_bcd.xz ]; then
            set has_ventoy_wimboot=1
        fi
    fi
fi

# ═══════════════════════════════════════
#  Display Header
# ═══════════════════════════════════════
echo ""
echo "  Gdisk Pre-Boot: ${gdisk_name}"
echo "  Type: Windows Imaging Format (WIM)"
if [ "${has_grubfm_wimboot}" = "1" ]; then
    echo "  UEFI wimboot: Ready (wimboot.xz)"
fi
if [ "${has_ventoy_wimboot}" = "1" ]; then
    echo "  BIOS wimboot: Ready (Ventoy method)"
fi
echo ""

# ═══════════════════════════════════════
#  UEFI Boot Methods (GrubFM modules)
# ═══════════════════════════════════════

if [ "${grub_platform}" = "efi" ]; then

    # ── GrubFM wimboot module ──
    if [ "${has_grubfm_wimboot}" = "1" ]; then
        menuentry "[UEFI] WIM Boot (wimboot)" "${gdisk_file}" {
            insmod xzio
            insmod wimboot
            insmod loopback
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            wimboot --rawwim --testmode=no \
                    @:bootmgfw.efi:(wimboot)/bootmgfw.efi \
                    @:boot.wim:"${2}"
        }
    fi

    # ── GrubFM wimboot + install tools ──
    if [ "${has_grubfm_wimboot}" = "1" -a "${has_install_xz}" = "1" ]; then
        menuentry "[UEFI] WIM Boot + Install Tools" "${gdisk_file}" {
            insmod xzio
            insmod wimboot
            insmod loopback
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            loopback install /boot/grub/wimboot/install.xz
            wimboot --testmode=no \
                    @:bootmgfw.efi:(wimboot)/bootmgfw.efi \
                    @:mount_x64.exe:(install)/mount_x64.exe \
                    @:mount_x86.exe:(install)/mount_x86.exe \
                    @:start.bat:(install)/start.bat \
                    @:winpeshl.ini:(install)/winpeshl.ini \
                    @:boot.wim:"${2}"
        }
    fi

    # ── GrubFM ntboot module ──
    if [ "${has_grubfm_wimboot}" = "1" ]; then
        menuentry "[UEFI] WIM Boot (ntboot)" "${gdisk_file}" {
            insmod xzio
            insmod ntboot
            insmod loopback
            set lang=en_US
            terminal_output console
            loopback wimboot /boot/grub/wimboot/wimboot.xz
            ntboot --testmode=no --efi=(wimboot)/bootmgfw.efi "${2}"
        }
    fi

fi

# ═══════════════════════════════════════
#  BIOS Boot Method (Ventoy-style)
# ═══════════════════════════════════════
#
# Uses iPXE wimboot binary (linux16) with:
#   bootmgr.exe from common_bootmgr.xz (PE32 BIOS bootmgr)
#   BCD from common_bcd.xz (pre-configured registry hive)
# These are xz-compressed and loopback-mounted as cpio/raw,
# then passed as newc: initrd entries to wimboot.

if [ "${grub_platform}" = "pc" ]; then

    if [ "${has_ventoy_wimboot}" = "1" ]; then
        menuentry "[BIOS] WIM Boot (Ventoy wimboot)" "${gdisk_file}" {
            insmod xzio
            insmod loopback
            set lang=en_US
            terminal_output console
            loopback bootmgr /boot/grub/wimboot/common_bootmgr.xz
            loopback bcdloop /boot/grub/wimboot/common_bcd.xz
            linux16 /boot/grub/wimboot/wimboot.x86_64.xz quiet
            initrd16 \
                newc:bootmgr.exe:(bootmgr) \
                newc:bcd:(bcdloop) \
                newc:boot.wim:"${2}"
            boot
        }
    fi

fi

# ── Back ──
menuentry "[<-] Back" {
    configfile /boot/grub/gdisk-boot.cfg
}
