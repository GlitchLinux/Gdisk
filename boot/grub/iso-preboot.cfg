# ╔═══════════════════════════════════════════════╗
# ║  Gdisk - ISO Pre-Boot Menu                    ║
# ║  Loopback-mounts, analyzes, offers boot paths  ║
# ╚═══════════════════════════════════════════════╝
#
# Variables expected (exported by caller):
#   gdisk_file  = "(hd0,gpt2)/Gdisk/file.iso"
#   gdisk_path  = "/Gdisk/file.iso"
#   gdisk_dev   = "hd0,gpt2"

# ── Load required modules ──
insmod regexp
insmod loopback
insmod iso9660
insmod probe
insmod chain
insmod linux

# ── Extract filename for display ──
regexp --set=gdisk_name '.*/(.*\.iso)$' "${gdisk_file}"
if [ -z "${gdisk_name}" ]; then
    set gdisk_name="${gdisk_path}"
fi

# ── Theme / Display ──
set timeout=-1
set default=0
set theme=/boot/grub/theme/theme-gdisk.cfg
set color_normal=white/black
set color_highlight=cyan/black

# ── Loopback mount the ISO ──
loopback loop "${gdisk_file}"

# ── Probe loop device ──
probe --set=looplabel --label (loop)
probe --set=loopuuid -u (loop)
probe --set=rootuuid -u "(${gdisk_dev})"
export rootuuid
export iso_path="${gdisk_path}"

# ═══════════════════════════════════════
#  OS / Distro Detection
# ═══════════════════════════════════════
set gdisk_ostype="unknown"
set gdisk_distro="Unknown ISO"
set gdisk_linux_extra=""

# ── Windows Installer ──
if [ -f (loop)/sources/boot.wim ]; then
    if [ -f (loop)/sources/install.wim -o -f (loop)/sources/install.esd -o -f (loop)/sources/install.swm ]; then
        set gdisk_ostype="windows"
        set gdisk_distro="Windows Installer"
    fi
fi

# ── Windows PE ──
if [ "${gdisk_ostype}" = "unknown" ]; then
    if [ -f (loop)/sources/boot.wim ]; then
        set gdisk_ostype="winpe"
        set gdisk_distro="Windows PE"
    fi
fi

# ── Ubuntu / Casper-based ──
if [ "${gdisk_ostype}" = "unknown" ]; then
    if [ -d (loop)/casper ]; then
        set gdisk_ostype="ubuntu"
        set gdisk_distro="Ubuntu/Casper"
        set gdisk_linux_extra="iso-scan/filename=${gdisk_path}"
    fi
fi

# ── Arch Linux ──
if [ "${gdisk_ostype}" = "unknown" ]; then
    if [ -d (loop)/arch ]; then
        set gdisk_ostype="arch"
        set gdisk_distro="Arch Linux"
        if [ -f (loop)/boot/vmlinuz_x86_64 ]; then
            set gdisk_linux_extra="iso_loop_dev=/dev/disk/by-uuid/${rootuuid} iso_loop_path=${gdisk_path}"
        else
            set gdisk_linux_extra="img_dev=/dev/disk/by-uuid/${rootuuid} img_loop=${gdisk_path} archisolabel=${looplabel}"
        fi
    fi
fi

# ── Fedora / LiveOS ──
if [ "${gdisk_ostype}" = "unknown" ]; then
    if [ -d (loop)/LiveOS ]; then
        set gdisk_ostype="fedora"
        set gdisk_distro="Fedora/LiveOS"
        set gdisk_linux_extra="root=live:CDLABEL=${looplabel} iso-scan/filename=${gdisk_path}"
    fi
fi

# ── openSUSE ──
if [ "${gdisk_ostype}" = "fedora" ]; then
    if [ -f (loop)/boot/*/loader/linux ]; then
        set gdisk_distro="openSUSE"
    fi
fi

# ── Debian / Live ──
if [ "${gdisk_ostype}" = "unknown" ]; then
    if [ -d (loop)/live ]; then
        set gdisk_ostype="debian"
        set gdisk_distro="Debian/Live"
        set gdisk_linux_extra="findiso=${gdisk_path}"
    fi
fi

# ── antiX ──
if [ "${gdisk_ostype}" = "unknown" ]; then
    if [ -d (loop)/antiX ]; then
        set gdisk_ostype="antix"
        set gdisk_distro="antiX"
        set gdisk_linux_extra="fromiso=${gdisk_path} from=hd,usb"
    fi
fi

# ── Slax ──
if [ "${gdisk_ostype}" = "unknown" ]; then
    if [ -d (loop)/slax ]; then
        set gdisk_ostype="slax"
        set gdisk_distro="Slax"
        set gdisk_linux_extra="from=${gdisk_path}"
    fi
fi

# ── Porteus ──
if [ "${gdisk_ostype}" = "unknown" ]; then
    if [ -d (loop)/porteus ]; then
        set gdisk_ostype="porteus"
        set gdisk_distro="Porteus"
        set gdisk_linux_extra="from=${gdisk_path}"
    fi
fi

# ── Parted Magic ──
if [ "${gdisk_ostype}" = "unknown" ]; then
    if [ -d (loop)/pmagic ]; then
        set gdisk_ostype="pmagic"
        set gdisk_distro="Parted Magic"
        set gdisk_linux_extra="iso_filename=${gdisk_path}"
    fi
fi

# ── Slackware Live ──
if [ "${gdisk_ostype}" = "unknown" ]; then
    if [ -d (loop)/liveslak ]; then
        set gdisk_ostype="slackware"
        set gdisk_distro="Slackware Live"
        set gdisk_linux_extra="livemedia=scandev:${gdisk_path}"
    fi
fi

# ── Android-x86 ──
if [ "${gdisk_ostype}" = "unknown" ]; then
    if [ -f (loop)/kernel -a -f (loop)/initrd.img -a -f (loop)/system.sfs ]; then
        set gdisk_ostype="android"
        set gdisk_distro="Android-x86"
        set gdisk_linux_extra="iso-scan/filename=${gdisk_path}"
    fi
fi

# ── TinyCore ──
if [ "${gdisk_ostype}" = "unknown" ]; then
    if [ -f (loop)/boot/core.gz -o -f (loop)/boot/corepure64.gz ]; then
        set gdisk_ostype="tinycore"
        set gdisk_distro="TinyCore"
        set gdisk_linux_extra="iso=UUID=${rootuuid}${gdisk_path}"
    fi
fi

# ── Knoppix ──
if [ "${gdisk_ostype}" = "unknown" ]; then
    if [ -f (loop)/boot/isolinux/minirt.gz ]; then
        set gdisk_ostype="knoppix"
        set gdisk_distro="Knoppix"
        set gdisk_linux_extra="bootfrom=/dev/*${gdisk_path}"
    fi
fi

# ── Proxmox ──
if [ "${gdisk_ostype}" = "unknown" ]; then
    if [ -d (loop)/proxmox ]; then
        set gdisk_ostype="proxmox"
        set gdisk_distro="Proxmox VE"
    fi
fi

# ── SystemRescue ──
if [ "${gdisk_ostype}" = "unknown" ]; then
    if [ -d (loop)/sysresccd ]; then
        set gdisk_ostype="sysresccd"
        set gdisk_distro="SystemRescue"
        set gdisk_linux_extra="img_dev=/dev/disk/by-uuid/${rootuuid} img_loop=${gdisk_path} archisolabel=${looplabel}"
    fi
fi

# ── Gentoo ──
if [ "${gdisk_ostype}" = "unknown" ]; then
    if [ -f (loop)/isolinux/gentoo -o -f (loop)/isolinux/gentoo64 ]; then
        set gdisk_ostype="gentoo"
        set gdisk_distro="Gentoo"
        set gdisk_linux_extra="isoboot=${gdisk_path}"
    fi
fi

# ── Check feature availability ──
set has_loopback=0
if [ -f (loop)/boot/grub/loopback.cfg ]; then
    set has_loopback=1
fi

set has_efi_boot=0
if [ -f (loop)/EFI/boot/bootx64.efi -o -f (loop)/EFI/BOOT/bootx64.efi -o -f (loop)/EFI/BOOT/BOOTX64.EFI ]; then
    set has_efi_boot=1
fi

set has_efi_grub=0
if [ -f (loop)/EFI/boot/grubx64.efi -o -f (loop)/EFI/BOOT/grubx64.efi ]; then
    set has_efi_grub=1
fi

# ── Cleanup loopback before menu ──
loopback -d loop

# ═══════════════════════════════════════
#  Display Header
# ═══════════════════════════════════════
echo ""
echo "  Gdisk Pre-Boot: ${gdisk_name}"
echo "  Detected: ${gdisk_distro}"
if [ -n "${looplabel}" ]; then
    echo "  Label: ${looplabel}"
fi
echo ""

# ═══════════════════════════════════════
#  Build Dynamic Boot Menu
# ═══════════════════════════════════════

# ── loopback.cfg ──
if [ "${has_loopback}" = "1" ]; then
    menuentry "[GRUB] Loopback.cfg Boot - ${gdisk_distro}" "${gdisk_file}" "${gdisk_path}" "${gdisk_dev}" {
        insmod loopback
        insmod iso9660
        insmod probe
        loopback loop "${2}"
        probe --set=rootuuid -u "(${4})"
        export iso_path="${3}"
        export rootuuid
        set root=loop
        configfile /boot/grub/loopback.cfg
    }
fi

# ── Distro-specific native boot ──
if [ "${gdisk_ostype}" = "ubuntu" ]; then
    menuentry "[NATIVE] Boot ${gdisk_distro} Live" "${gdisk_file}" "${gdisk_path}" {
        insmod loopback
        insmod iso9660
        loopback loop "${2}"
        linux (loop)/casper/vmlinuz boot=casper noprompt noeject iso-scan/filename=${3}
        initrd (loop)/casper/initrd
    }
fi

if [ "${gdisk_ostype}" = "debian" ]; then
    menuentry "[NATIVE] Boot ${gdisk_distro} Live" "${gdisk_file}" "${gdisk_path}" {
        insmod loopback
        insmod iso9660
        loopback loop "${2}"
        if [ -f (loop)/live/vmlinuz ]; then
            linux (loop)/live/vmlinuz boot=live config findiso=${3}
            initrd (loop)/live/initrd.img
        else
            linux (loop)/live/vmlinuz boot=live config findiso=${3}
            initrd (loop)/live/initrd
        fi
    }
fi

if [ "${gdisk_ostype}" = "arch" -o "${gdisk_ostype}" = "sysresccd" ]; then
    menuentry "[NATIVE] Boot ${gdisk_distro}" "${gdisk_file}" "${gdisk_linux_extra}" {
        insmod loopback
        insmod iso9660
        loopback loop "${2}"
        if [ -f (loop)/boot/vmlinuz_x86_64 ]; then
            linux (loop)/boot/vmlinuz_x86_64 ${3}
            initrd (loop)/boot/intel_ucode.img (loop)/boot/amd_ucode.img (loop)/boot/initramfs_x86_64.img
        elif [ -f (loop)/boot/x86_64/vmlinuz-linux ]; then
            linux (loop)/boot/x86_64/vmlinuz-linux ${3}
            initrd (loop)/boot/x86_64/initramfs-linux.img
        fi
    }
fi

if [ "${gdisk_ostype}" = "fedora" ]; then
    menuentry "[NATIVE] Boot ${gdisk_distro} Live" "${gdisk_file}" "${gdisk_linux_extra}" {
        insmod loopback
        insmod iso9660
        loopback loop "${2}"
        if [ -f (loop)/isolinux/vmlinuz ]; then
            linux (loop)/isolinux/vmlinuz ${3} rd.live.image quiet
            initrd (loop)/isolinux/initrd.img
        elif [ -f (loop)/images/pxeboot/vmlinuz ]; then
            linux (loop)/images/pxeboot/vmlinuz ${3} rd.live.image quiet
            initrd (loop)/images/pxeboot/initrd.img
        fi
    }
fi

if [ "${gdisk_ostype}" = "antix" ]; then
    menuentry "[NATIVE] Boot ${gdisk_distro} Live" "${gdisk_file}" "${gdisk_linux_extra}" {
        insmod loopback
        insmod iso9660
        loopback loop "${2}"
        linux (loop)/antiX/vmlinuz ${3} quiet splash
        initrd (loop)/antiX/initrd.gz
    }
fi

if [ "${gdisk_ostype}" = "pmagic" ]; then
    menuentry "[NATIVE] Boot ${gdisk_distro}" "${gdisk_file}" "${gdisk_linux_extra}" {
        insmod loopback
        insmod iso9660
        loopback loop "${2}"
        linux (loop)/pmagic/bzImage ${3} edd=off load_ramdisk=1 prompt_ramdisk=0 rw sleep=10 loglevel=0
        initrd (loop)/pmagic/initrd.img
    }
fi

if [ "${gdisk_ostype}" = "tinycore" ]; then
    menuentry "[NATIVE] Boot ${gdisk_distro}" "${gdisk_file}" "${gdisk_linux_extra}" {
        insmod loopback
        insmod iso9660
        loopback loop "${2}"
        if [ -f (loop)/boot/vmlinuz64 ]; then
            linux (loop)/boot/vmlinuz64 ${3}
            initrd (loop)/boot/corepure64.gz
        else
            linux (loop)/boot/vmlinuz ${3}
            initrd (loop)/boot/core.gz
        fi
    }
fi

if [ "${gdisk_ostype}" = "android" ]; then
    menuentry "[NATIVE] Boot ${gdisk_distro}" "${gdisk_file}" "${gdisk_linux_extra}" {
        insmod loopback
        insmod iso9660
        loopback loop "${2}"
        linux (loop)/kernel quiet root=/dev/ram0 ${3}
        initrd (loop)/initrd.img
    }
fi

# ── Raw UEFI Boot ──
if [ "${grub_platform}" = "efi" ]; then
    menuentry "[UEFI] Raw Boot - map -f (Direct)" "${gdisk_file}" {
        map -f "${2}"
    }
fi

# ── Chainload EFI ──
if [ "${grub_platform}" = "efi" ]; then
    if [ "${has_efi_boot}" = "1" ]; then
        menuentry "[UEFI] Chainload EFI/boot/bootx64.efi" "${gdisk_file}" {
            insmod loopback
            insmod iso9660
            insmod chain
            loopback loop "${2}"
            if [ -f (loop)/EFI/boot/bootx64.efi ]; then
                chainloader (loop)/EFI/boot/bootx64.efi
            elif [ -f (loop)/EFI/BOOT/bootx64.efi ]; then
                chainloader (loop)/EFI/BOOT/bootx64.efi
            elif [ -f (loop)/EFI/BOOT/BOOTX64.EFI ]; then
                chainloader (loop)/EFI/BOOT/BOOTX64.EFI
            fi
        }
    fi
fi

if [ "${grub_platform}" = "efi" ]; then
    if [ "${has_efi_grub}" = "1" ]; then
        menuentry "[UEFI] Chainload EFI/boot/grubx64.efi" "${gdisk_file}" {
            insmod loopback
            insmod iso9660
            insmod chain
            loopback loop "${2}"
            if [ -f (loop)/EFI/boot/grubx64.efi ]; then
                chainloader (loop)/EFI/boot/grubx64.efi
            elif [ -f (loop)/EFI/BOOT/grubx64.efi ]; then
                chainloader (loop)/EFI/BOOT/grubx64.efi
            fi
        }
    fi
fi

if [ "${grub_platform}" = "efi" ]; then
    menuentry "[UEFI] Raw Boot - map -f -g (Force Geometry)" "${gdisk_file}" {
        map -f -g "${2}"
    }
fi

# ── BIOS boot methods ──
if [ "${grub_platform}" = "pc" ]; then
    menuentry "[BIOS] Memdisk Chainload" "${gdisk_file}" {
        set enable_progress_indicator=1
        linux16 /boot/grub/images/memdisk iso raw
        initrd16 "${2}"
        boot
    }
fi

if [ "${grub_platform}" = "pc" ]; then
    if [ -f /boot/grub/images/grub.exe ]; then
        menuentry "[BIOS] Grub4dos Map (any size)" "${gdisk_path}" {
            linux16 /boot/grub/images/grub.exe --config-file="map ${2} (0xff) || map --mem ${2} (0xff);map --hook;chainloader (0xff);boot"
            boot
        }
    fi
fi

# ── Back ──
menuentry "[<-] Back" {
    configfile /boot/grub/gdisk-boot.cfg
}
