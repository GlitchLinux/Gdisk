# ====================================================================
#  wimboot-scan.cfg  -  static payload, dynamic .wim discovery
# --------------------------------------------------------------------
#  Boot files live ONCE at ${WB_DIR}. The ONLY per-entry variable is
#  the .wim path. No GRUB functions (they are fragile inside blocks);
#  the boot logic is inlined in each menuentry. The one real fix vs
#  the original is ${1} instead of ${2} for the passed wim path.
# ====================================================================

# -- Required modules -------------------------------------------------
insmod regexp
insmod search
insmod part_gpt
insmod part_msdos
insmod fat
insmod exfat
insmod ntfs
insmod ext2

# -- Theme / Display --------------------------------------------------
if loadfont /boot/grub/font.pf2 ; then
    set gfxmode=auto
    insmod gfxterm
    terminal_output gfxterm
fi
insmod png
if [ -f /boot/grub/theme.cfg ]; then
    set theme=/boot/grub/theme.cfg
fi
set timeout=30
set default=0
set color_normal=white/black
set color_highlight=white/black

# -- Static payload location ------------------------------------------
set WB_DIR=/boot/grub/wimboot
search --no-floppy --file --set=wb_root ${WB_DIR}/wimboot

if [ -z "${wb_root}" ]; then
    menuentry "ERROR: wimboot payload not found - read me" {
        echo ""
        echo "  Could not locate ${WB_DIR}/wimboot on any partition."
        echo "  Populate ${WB_DIR} with these EXACT filenames:"
        echo "    wimboot  bootmgr  bootmgr.efi  BCD  boot.sdi"
        echo ""
        sleep --interruptible 9999
    }
fi

# -- Dynamic discovery ------------------------------------------------
#  Sweep hd0-hd7, parts 1-8, gpt+msdos, root + one dir deep.
set wim_found=0

for disk in 0 1 2 3 4 5 6 7; do
    for partnum in 1 2 3 4 5 6 7 8; do
        for partscheme in gpt msdos; do
            set trypart="(hd${disk},${partscheme}${partnum})"

            if [ -d "${trypart}/" ]; then

                # -- root of partition --------------------------------
                for wimfile in ${trypart}/*.wim ${trypart}/*.WIM; do
                    if [ -f "${wimfile}" ]; then
                        regexp --set=1:wim_base '/([^/]+)$' "${wimfile}"
                        set wim_found=1
                        menuentry "WinPE: ${wim_base}   [${trypart}]" "${wimfile}" {
                            set wimpath="${1}"
                            if [ "${grub_platform}" = "efi" ]; then
                                linux  (${wb_root})${WB_DIR}/wimboot
                                initrd newc:bootmgr:(${wb_root})${WB_DIR}/bootmgr.efi newc:bcd:(${wb_root})${WB_DIR}/BCD newc:boot.sdi:(${wb_root})${WB_DIR}/boot.sdi newc:boot.wim:${wimpath}
                            else
                                linux16  (${wb_root})${WB_DIR}/wimboot
                                initrd16 newc:bootmgr:(${wb_root})${WB_DIR}/bootmgr newc:bcd:(${wb_root})${WB_DIR}/BCD newc:boot.sdi:(${wb_root})${WB_DIR}/boot.sdi newc:boot.wim:${wimpath}
                            fi
                            boot
                        }
                    fi
                done

                # -- one directory deep -------------------------------
                for subdir in ${trypart}/*/; do
                    if [ -d "${subdir}" ]; then
                        for wimfile in ${subdir}*.wim ${subdir}*.WIM; do
                            if [ -f "${wimfile}" ]; then
                                regexp --set=1:wim_base '/([^/]+)$' "${wimfile}"
                                set wim_found=1
                                menuentry "WinPE: ${wim_base}   [${trypart}]" "${wimfile}" {
                                    set wimpath="${1}"
                                    if [ "${grub_platform}" = "efi" ]; then
                                        linux  (${wb_root})${WB_DIR}/wimboot
                                        initrd newc:bootmgr:(${wb_root})${WB_DIR}/bootmgr.efi newc:bcd:(${wb_root})${WB_DIR}/BCD newc:boot.sdi:(${wb_root})${WB_DIR}/boot.sdi newc:boot.wim:${wimpath}
                                    else
                                        linux16  (${wb_root})${WB_DIR}/wimboot
                                        initrd16 newc:bootmgr:(${wb_root})${WB_DIR}/bootmgr newc:bcd:(${wb_root})${WB_DIR}/BCD newc:boot.sdi:(${wb_root})${WB_DIR}/boot.sdi newc:boot.wim:${wimpath}
                                    fi
                                    boot
                                }
                            fi
                        done
                    fi
                done

            fi
        done
    done
done

if [ "${wim_found}" = "0" ]; then
    menuentry "No .wim images found on any partition" {
        echo ""
        echo "  Drop a WinPE .wim onto any FAT32/NTFS/exFAT/ext partition"
        echo "  (root level or one folder deep) and re-enter this menu."
        echo ""
        sleep --interruptible 9999
    }
fi

# -- Navigation -------------------------------------------------------
menuentry "[<-]  Back to main menu" {
    configfile /boot/grub/images/grub.cfg
}
