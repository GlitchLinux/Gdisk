# ╔═══════════════════════════════════════════════╗
# ║  Gdisk - IMG Pre-Boot Menu                    ║
# ║  Loopback-mounts, analyzes, offers boot paths  ║
# ╚═══════════════════════════════════════════════╝
#
# Variables expected (exported by gdisk-boot.cfg):
#   gdisk_file  = "(hd0,gpt2)/Gdisk/file.img" or "/Gdisk/file.img"
#   gdisk_path  = "/Gdisk/file.img"
#   gdisk_dev   = device string

# ── Load required modules ──
insmod regexp
insmod loopback
insmod probe
insmod chain
insmod fat
insmod part_gpt
insmod part_msdos

# ── Extract filename for display ──
regexp --set=gdisk_name '.*/(.*\.img)$' "${gdisk_file}"
if [ -z "${gdisk_name}" ]; then
    set gdisk_name="${gdisk_path}"
fi

# ── Theme / Display ──
set timeout=-1
set default=0
set theme=/boot/grub/theme/theme-gdisk.cfg
set color_normal=white/black
set color_highlight=cyan/black

# ── Try to loopback mount the IMG to inspect contents ──
set gdisk_loop_ok=0
loopback loop "${gdisk_file}" && set gdisk_loop_ok=1

# ── Detect structures inside IMG ──
set has_efi_dir=0
set has_efi_boot=0
set has_efi_grub=0
set has_grub_cfg=0
set has_bootmgr=0
set has_ntldr=0
set gdisk_imgtype="unknown"
set gdisk_label="Disk Image"

if [ "${gdisk_loop_ok}" = "1" ]; then
    # EFI structures
    if [ -d (loop)/EFI ]; then
        set has_efi_dir=1
    fi
    if [ -f (loop)/EFI/boot/bootx64.efi -o -f (loop)/EFI/BOOT/bootx64.efi -o -f (loop)/EFI/BOOT/BOOTX64.EFI ]; then
        set has_efi_boot=1
    fi
    if [ -f (loop)/EFI/boot/grubx64.efi -o -f (loop)/EFI/BOOT/grubx64.efi ]; then
        set has_efi_grub=1
    fi

    # GRUB config
    if [ -f (loop)/boot/grub/grub.cfg -o -f (loop)/grub/grub.cfg ]; then
        set has_grub_cfg=1
    fi

    # Windows bootloaders
    if [ -f (loop)/bootmgr -o -f (loop)/BOOTMGR ]; then
        set has_bootmgr=1
        set gdisk_imgtype="winpe"
        set gdisk_label="Windows PE Image"
    fi
    if [ -f (loop)/ntldr -o -f (loop)/NTLDR ]; then
        set has_ntldr=1
        set gdisk_imgtype="winxp"
        set gdisk_label="Windows XP Image"
    fi

    # Linux kernel
    if [ -f (loop)/vmlinuz -o -f (loop)/boot/vmlinuz ]; then
        set gdisk_imgtype="linux"
        set gdisk_label="Linux Image"
    fi

    # Ventoy
    if [ -f (loop)/ventoy/ventoy.cpio ]; then
        set gdisk_imgtype="ventoy"
        set gdisk_label="Ventoy Image"
    fi

    # Bootable disk with EFI
    if [ "${gdisk_imgtype}" = "unknown" ]; then
        if [ "${has_efi_dir}" = "1" -o "${has_grub_cfg}" = "1" ]; then
            set gdisk_imgtype="bootable-disk"
            set gdisk_label="Bootable Disk Image"
        fi
    fi

    # Cleanup - menuentries will re-mount
    loopback -d loop
fi

# ═══════════════════════════════════════
#  Display Header
# ═══════════════════════════════════════
echo ""
echo "  Gdisk Pre-Boot: ${gdisk_name}"
echo "  Detected: ${gdisk_label}"
if [ "${has_efi_dir}" = "1" ]; then
    echo "  EFI: Found"
fi
echo ""

# ═══════════════════════════════════════
#  Build Dynamic Boot Menu
# ═══════════════════════════════════════

# ── Option: Loopmount + chainload EFI bootloader ──
if [ "${grub_platform}" = "efi" ]; then
    if [ "${has_efi_boot}" = "1" ]; then
        menuentry "[UEFI] Chainload EFI/boot/bootx64.efi" "${gdisk_file}" {
            insmod loopback
            insmod fat
            insmod chain
            loopback loop "${2}"
            if [ -f (loop)/EFI/boot/bootx64.efi ]; then
                chainloader (loop)/EFI/boot/bootx64.efi
            elif [ -f (loop)/EFI/BOOT/bootx64.efi ]; then
                chainloader (loop)/EFI/BOOT/bootx64.efi
            elif [ -f (loop)/EFI/BOOT/BOOTX64.EFI ]; then
                chainloader (loop)/EFI/BOOT/BOOTX64.EFI
            fi
        }
    fi
fi

if [ "${grub_platform}" = "efi" ]; then
    if [ "${has_efi_grub}" = "1" ]; then
        menuentry "[UEFI] Chainload EFI/boot/grubx64.efi" "${gdisk_file}" {
            insmod loopback
            insmod fat
            insmod chain
            loopback loop "${2}"
            if [ -f (loop)/EFI/boot/grubx64.efi ]; then
                chainloader (loop)/EFI/boot/grubx64.efi
            elif [ -f (loop)/EFI/BOOT/grubx64.efi ]; then
                chainloader (loop)/EFI/BOOT/grubx64.efi
            fi
        }
    fi
fi

# ── Option: Loopmount + load grub.cfg from IMG ──
if [ "${has_grub_cfg}" = "1" ]; then
    menuentry "[GRUB] Load grub.cfg from Image" "${gdisk_file}" {
        insmod loopback
        loopback loop "${2}"
        set root=loop
        if [ -f (loop)/boot/grub/grub.cfg ]; then
            configfile /boot/grub/grub.cfg
        elif [ -f (loop)/grub/grub.cfg ]; then
            configfile /grub/grub.cfg
        fi
    }
fi

# ── Option: Raw UEFI Boot (map, hard disk) ──
if [ "${grub_platform}" = "efi" ]; then
    menuentry "[UEFI] Raw Boot - map (Hard Disk)" "${gdisk_file}" {
        map "${2}"
    }

    menuentry "[UEFI] Raw Boot - map -f (Forced)" "${gdisk_file}" {
        map -f "${2}"
    }

    menuentry "[UEFI] Floppy Disk Boot - map --type=FD" "${gdisk_file}" {
        map --type=FD "${2}"
    }
fi

# ── Option: Memdisk HDD (BIOS) ──
if [ "${grub_platform}" = "pc" ]; then
    menuentry "[BIOS] Memdisk - Hard Disk" "${gdisk_file}" {
        set enable_progress_indicator=1
        linux16 /boot/grub/images/memdisk harddisk raw
        initrd16 "${2}"
        boot
    }

    menuentry "[BIOS] Memdisk - Floppy Disk" "${gdisk_file}" {
        set enable_progress_indicator=1
        linux16 /boot/grub/images/memdisk floppy raw
        initrd16 "${2}"
        boot
    }
fi

# ── Option: Grub4dos map as HDD (BIOS) ──
if [ "${grub_platform}" = "pc" ]; then
    if [ -f /boot/grub/images/grub.exe ]; then
        menuentry "[BIOS] Grub4dos Map - Hard Disk" "${gdisk_path}" {
            linux16 /boot/grub/images/grub.exe --config-file="map ${2} (hd-1) || map --mem ${2} (hd-1);map --hook;rootnoverify (hd-1);chainloader +1;boot"
            boot
        }

        menuentry "[BIOS] Grub4dos Map - Floppy Disk" "${gdisk_path}" {
            linux16 /boot/grub/images/grub.exe --config-file="map --mem ${2} (fd0);map --hook;rootnoverify (fd0);chainloader +1;boot"
            boot
        }
    fi
fi

# ── Option: Vdiskchain boot ──
if [ -f /boot/grub/vdiskchain/vdiskchain ]; then
    if [ "${grub_platform}" = "efi" ]; then
        menuentry "[UEFI] VdiskChain Boot" "${gdisk_path}" {
            insmod chain
            chainloader /boot/grub/vdiskchain/vdiskchain vdisk=${2}
            boot
        }
    fi
    if [ "${grub_platform}" = "pc" ]; then
        menuentry "[BIOS] VdiskChain Boot" "${gdisk_path}" {
            search --file --set=root /boot/grub/vdiskchain/vdisk.krn
            linux16 /boot/grub/vdiskchain/vdisk.krn vdisk=${2}
            initrd16 /boot/grub/vdiskchain/vdiskchain
            boot
        }
    fi
fi

# ── Back ──
menuentry "[<-] Back to Gdisk Menu" {
    configfile /boot/grub/gdisk-boot.cfg
}
