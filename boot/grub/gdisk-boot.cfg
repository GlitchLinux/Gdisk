#  ╔═══════════════════════════════════════╗
#  ║ Gdisk v3 - Dynamic Bootloader         ║
#  ║ Pre-Boot Analysis for .iso .img .vtoy  ║
#  ║ in /Gdisk directory                    ║
#  ╚═══════════════════════════════════════╝

set timeout=10
set default=0
set theme=/boot/grub/theme/theme-gdisk.cfg
set color_normal=white/black
set color_highlight=white/black

insmod regexp
insmod loopback
insmod probe

# ╔════════════════════════════════════╗
# ║ .ISO files -> ISO Pre-Boot Menu    ║
# ╚════════════════════════════════════╝
for isofile in /Gdisk/*.iso; do
    if [ -f "${isofile}" ]; then
        regexp --set=name '/Gdisk/(.*)' "${isofile}"
        menuentry "${name}" "${isofile}" {
            set gdisk_path="${2}"
            set gdisk_dev="${root}"
            set gdisk_file="(${root})${2}"
            export gdisk_file
            export gdisk_path
            export gdisk_dev
            configfile /boot/grub/iso-preboot.cfg
        }
    fi
done

# ╔════════════════════════════════════╗
# ║ .IMG files -> IMG Pre-Boot Menu    ║
# ╚════════════════════════════════════╝
for imgfile in /Gdisk/*.img; do
    if [ -f "${imgfile}" ]; then
        regexp --set=name '/Gdisk/(.*)' "${imgfile}"
        menuentry "${name}" "${imgfile}" {
            set gdisk_path="${2}"
            set gdisk_dev="${root}"
            set gdisk_file="(${root})${2}"
            export gdisk_file
            export gdisk_path
            export gdisk_dev
            configfile /boot/grub/img-preboot.cfg
        }
    fi
done

# ╔═════════════════════════════════════╗
# ║ .VTOY files -> VdiskChain (direct)  ║
# ╚═════════════════════════════════════╝
if [ "${grub_platform}" = "efi" ]; then
    for vtoyfile in /Gdisk/*.vtoy; do
        if [ -f "${vtoyfile}" ]; then
            regexp --set=name '/Gdisk/(.*)' "${vtoyfile}"
            menuentry "${name}" "${vtoyfile}" {
                insmod chain
                chainloader /boot/grub/vdiskchain/vdiskchain vdisk=${2}
                boot
            }
        fi
    done
fi

if [ "${grub_platform}" = "pc" ]; then
    for vtoyfile in /Gdisk/*.vtoy; do
        if [ -f "${vtoyfile}" ]; then
            regexp --set=name '/Gdisk/(.*)' "${vtoyfile}"
            menuentry "${name}" "${vtoyfile}" {
                search --file --set=root /boot/grub/vdiskchain/vdisk.krn
                linux16 /boot/grub/vdiskchain/vdisk.krn vdisk=${2}
                initrd16 /boot/grub/vdiskchain/vdiskchain
                boot
            }
        fi
    done
fi

# ╔═══════════════════╗
# ║ Navigation         ║
# ╚═══════════════════╝
menuentry "[<-] Back to Main Menu" {
    configfile /boot/grub/grub.cfg
}
