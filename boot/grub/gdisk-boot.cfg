#  ╔═════════════════════════════════╗
#  ║ Gdisk v2 - Dynamic Bootloader   ║
#  ║ Boots .iso .img .vtoy in /Gdisk ║
#  ╚═════════════════════════════════╝

set timeout=10
set default=0
set theme=/boot/grub/theme/theme-gdisk.cfg
set color_normal=white/black
set color_highlight=white/black

# regexp needed to extract the filename from the full path
insmod regexp

# ╔════════════════╗
# ║ .ISO UEFI BOOT ║
# ╚════════════════╝
if [ "${grub_platform}" = "efi" ]; then
    for isofile in /Gdisk/*.iso; do
        if [ -f "${isofile}" ]; then
            regexp --set=name '/Gdisk/(.*)' "${isofile}"
            menuentry "${name}" "${isofile}" {
                set isopath="$2"
                map -f "${isopath}"
            }
        fi
    done
fi

# ╔════════════════╗
# ║ .ISO BIOS BOOT ║
# ╚════════════════╝
if [ "${grub_platform}" = "pc" ]; then
    for isofile in /Gdisk/*.iso; do
        if [ -f "${isofile}" ]; then
            regexp --set=name '/Gdisk/(.*)' "${isofile}"
            menuentry "${name}" "${isofile}" {
                set isopath="$2"
                # --- Method 1: native GRUB2 loopback (agFM loop.sh) ---
                # Works for any ISO shipping /boot/grub/loopback.cfg.
                # No memdisk, no grub4dos, no 1GB size limit.
                loopback -d loop
                loopback loop "${isopath}"
                if [ -f (loop)/boot/grub/loopback.cfg ]; then
                    probe --set=rootuuid -u "${root}"
                    export iso_path="${isopath}"
                    export rootuuid
                    export root=loop
                    configfile (loop)/boot/grub/grub.cfg
                else
                    # --- Method 2: fallback to grub.exe (grub4dos) map ---
                    # For WinPE/utility ISOs with no loopback.cfg.
                    # Disk-backed map = no 1GB limit (unlike memdisk).
                    loopback -d loop
                    echo "No loopback.cfg - booting via grub4dos map..."
                    if [ -f /boot/grub/images/grub.exe ]; then
                        linux16 /boot/grub/images/grub.exe --config-file="map ${isopath} (0xff) || map --mem ${isopath} (0xff);map --hook;chainloader (0xff);boot"
                        boot
                    else
                        echo "grub.exe not found; using memdisk (max ~1GB)"
                        linux16 /boot/grub/images/memdisk iso
                        initrd16 "${isopath}"
                        boot
                    fi
                fi
            }
        fi
    done
fi

# ╔════════════════╗
# ║ .IMG UEFI BOOT ║
# ╚════════════════╝
if [ "${grub_platform}" = "efi" ]; then
    for isofile in /Gdisk/*.img; do
        if [ -f "${isofile}" ]; then
            regexp --set=name '/Gdisk/(.*)' "${isofile}"
            menuentry "${name}" "${isofile}" {
                set isopath="$2"
                map -f "${isopath}"
            }
        fi
    done
fi

# ╔════════════════╗
# ║ .IMG BIOS BOOT ║
# ╚════════════════╝
if [ "${grub_platform}" = "pc" ]; then
    for isofile in /Gdisk/*.img; do
        if [ -f "${isofile}" ]; then
            regexp --set=name '/Gdisk/(.*)' "${isofile}"
            eval "menuentry \"${name}\" { linux16 /boot/grub/images/memdisk img; initrd16 ${isofile}; boot; }"
        fi
    done
fi

# ╔═════════════════╗
# ║ .VTOY UEFI BOOT ║
# ╚═════════════════╝
if [ "${grub_platform}" = "efi" ]; then
    for isofile in /Gdisk/*.vtoy; do
        if [ -f "${isofile}" ]; then
            regexp --set=name '/Gdisk/(.*)' "${isofile}"
            menuentry "${name}" "${isofile}" {
                set isopath="$2"
                insmod chain
                chainloader /boot/grub/vdiskchain/vdiskchain vdisk=${isopath}
                boot
            }
        fi
    done
fi

# ╔═════════════════╗
# ║ .VTOY BIOS BOOT ║
# ╚═════════════════╝
if [ "${grub_platform}" = "pc" ]; then
    for isofile in /Gdisk/*.vtoy; do
        if [ -f "${isofile}" ]; then
            regexp --set=name '/Gdisk/(.*)' "${isofile}"
            menuentry "${name}" "${isofile}" {
                set isopath="$2"
                search --file --set=root /boot/grub/vdiskchain/vdisk.krn
                linux16 /boot/grub/vdiskchain/vdisk.krn vdisk=${isopath}
                initrd16 /boot/grub/vdiskchain/vdiskchain
                boot
            }
        fi
    done
fi

menuentry "[<-]" {
    configfile /boot/grub/grub.cfg
}