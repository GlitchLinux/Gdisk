# ====================================================================
#  winpe-native.cfg - Native Windows Boot Manager WinPE loader
# --------------------------------------------------------------------
#  Boots .wim files using real bootmgr/BOOTX64.EFI chainload.
#  100% compatible - same method as standalone WinPE-Chainloader.
#
#  Layout on this partition:
#    /boot/bootmgr       - Windows Boot Manager (BIOS)
#    /boot/bcd           - BCD hive patched to \WIM\boot.wim
#    /boot/boot.sdi      - RAMDisk template
#    /EFI/microsoft/boot/BOOTX64.EFI  - Windows Boot Manager (UEFI)
#    /EFI/microsoft/boot/bcd          - BCD hive patched to \WIM\boot.wim
#    /EFI/microsoft/boot/boot.sdi     - RAMDisk template
#    /EFI/microsoft/microsoft/boot/BCD      - Fallback UEFI BCD
#    /EFI/microsoft/microsoft/boot/boot.sdi - Fallback boot.sdi
#    /WIM/boot.wim       - Active WinPE image (user places here)
#
#  User workflow:
#    1. Place .wim files in /WIM/ on this partition
#    2. Rename the one you want to boot to "boot.wim"
#    3. Select "WinPE Native Boot" from GRUB menu
# ====================================================================

# -- Required modules -------------------------------------------------
insmod regexp
insmod search
insmod part_gpt
insmod part_msdos
insmod fat
insmod exfat
insmod ntfs
insmod ext2
insmod ntldr
insmod chain

# -- Theme / Display --------------------------------------------------
if loadfont /boot/grub/font.pf2 ; then
    set gfxmode=auto
    insmod gfxterm
    terminal_output gfxterm
fi
insmod png
if [ -f /boot/grub/theme.cfg ]; then
    set theme=/boot/grub/theme.cfg
fi
set timeout=30
set default=0
set color_normal=white/black
set color_highlight=white/black

# -- Verify boot infrastructure exists --------------------------------
set winpe_ready=0

if [ "${grub_platform}" = "efi" ]; then
    if [ -f /EFI/microsoft/boot/BOOTX64.EFI ] && [ -f /EFI/microsoft/boot/bcd ]; then
        set winpe_ready=1
    fi
fi

if [ "${grub_platform}" = "pc" ]; then
    if [ -f /boot/bootmgr ] && [ -f /boot/bcd ]; then
        set winpe_ready=1
    fi
fi

if [ "${winpe_ready}" = "0" ]; then
    menuentry "ERROR: WinPE boot files not found" {
        echo ""
        echo "  WinPE native boot infrastructure is missing."
        echo "  Run the deployment script to install boot files."
        echo ""
        echo "  Required files:"
        echo "    /boot/bootmgr, /boot/bcd, /boot/boot.sdi"
        echo "    /EFI/microsoft/boot/BOOTX64.EFI"
        echo "    /EFI/microsoft/boot/bcd"
        echo ""
        sleep --interruptible 9999
    }
fi

# -- Check for active boot.wim ---------------------------------------
if [ -f /Wim/boot.wim ]; then

    if [ "${grub_platform}" = "efi" ]; then
        menuentry "WinPE Native Boot [UEFI] - /Wim/boot.wim" {
            chainloader /EFI/microsoft/boot/BOOTX64.EFI
        }
    fi

    if [ "${grub_platform}" = "pc" ]; then
        menuentry "WinPE Native Boot [BIOS] - /Wim/boot.wim" {
            ntldr /boot/bootmgr
        }
    fi

fi

# -- List all .wim files in /WIM/ for reference -----------------------
set wim_found=0

for wimfile in /Wim/*.wim /Wim/*.WIM; do
    if [ -f "${wimfile}" ]; then
        regexp --set=1:wim_name '/([^/]+)$' "${wimfile}"
        set wim_found=1

        if [ "${wim_name}" != "boot.wim" ] && [ "${wim_name}" != "boot.WIM" ]; then
            menuentry "  [inactive] ${wim_name}  -  rename to boot.wim to use" "${wim_name}" {
                echo ""
                echo "  This .wim is not the active boot image."
                echo "  To boot '${1}':"
                echo ""
                echo "  1. Mount this USB drive from Linux or WinPE"
                echo "  2. In the /WIM/ folder:"
                echo "     - Rename current boot.wim to its original name"
                echo "     - Rename '${1}' to boot.wim"
                echo "  3. Reboot and select 'WinPE Native Boot'"
                echo ""
                sleep --interruptible 9999
            }
        fi
    fi
done

# -- No .wim found at all --------------------------------------------
if [ "${wim_found}" = "0" ]; then
    menuentry "No .wim images found in /Wim/" {
        echo ""
        echo "  Place your WinPE .wim file(s) in the /Wim/ directory"
        echo "  on this partition, and name the active one 'boot.wim'"
        echo ""
        echo "  Example:"
        echo "    /Wim/boot.wim          <- will be booted"
        echo "    /Wim/macrium.wim       <- stored for later use"
        echo "    /Wim/win11-rescue.wim  <- stored for later use"
        echo ""
        sleep --interruptible 9999
    }
elif [ ! -f /Wim/boot.wim ]; then
    menuentry "WARNING: No boot.wim found - rename a .wim to boot.wim" {
        echo ""
        echo "  Found .wim files in /WIM/ but none named 'boot.wim'"
        echo "  Rename the .wim you want to boot to 'boot.wim'"
        echo ""
        sleep --interruptible 9999
    }
fi

# -- Navigation -------------------------------------------------------
menuentry "[<-] Back to main menu" {
    configfile /boot/grub/grub.cfg
}
