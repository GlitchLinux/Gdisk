if loadfont /boot/grub/dejavu-56.pf2 ; then
    set gfxmode=auto
    insmod gfxterm
    insmod video_bochs
    insmod video_cirrus
    terminal_output gfxterm
fi
insmod png
background_image -m stretch /boot/grub/theme/grub.png
set timeout=10
set default=0
set theme=/boot/grub/theme/theme-56.cfg

### Font Size Adjustment ###

submenu "Font Size Adjustment" {
    menuentry "48pt (Large)" {
        if loadfont /boot/grub/dejavu-48.pf2 ; then
            set theme=/boot/grub/theme/theme-48.cfg
        fi
    }
    
    menuentry "56pt (Current - Very Large)" {
        if loadfont /boot/grub/dejavu-56.pf2 ; then
            set theme=/boot/grub/theme/theme-56.cfg
        fi
    }
    
    menuentry "64pt (Massive)" {
        if loadfont /boot/grub/dejavu-64.pf2 ; then
            set theme=/boot/grub/theme/theme-64.cfg
        fi
    }
    
    menuentry "72pt (Maximum)" {
        if loadfont /boot/grub/dejavu-72.pf2 ; then
            set theme=/boot/grub/theme/theme-72.cfg
        fi
    }
    
    menuentry "[←] Back" {
        configfile /boot/grub/system.cfg
    }
}

### Universal Boot Entries ###

if [ "${grub_platform}" = "efi" ]; then
    menuentry "Local EFI Boot" {
        configfile /boot/grub/boot-local-efi.cfg
    }
fi

menuentry "Gdisk Info"{
  echo ""
  echo "Gdisk v3.0 - Portable Computing"
  echo ""
  echo "Forked Grub2 Multibooter Utility"
  echo ""
  echo "https://github.com/glitchlinux/gdisk.git"
  echo ""
  echo "Gdisk version: 3.0 - Maintainer: Glitch Linux"
  echo ""
  echo "Disclaimer: Gdisk comes with ABSOLUTELY NO WARRANTY"
  sleep 30
}

menuentry "Shutdown" {
    halt
}

menuentry "Reboot" {
    reboot
}

menuentry "[←]" {
    configfile /boot/grub/grub.cfg
}
