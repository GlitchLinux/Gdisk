if loadfont /boot/grub/font.pf2 ; then
    set gfxmode=auto
    insmod gfxterm
    insmod video_bochs
    insmod video_cirrus
    terminal_output gfxterm
fi
insmod png
background_image -m stretch /boot/grub/theme/grub.png
set timeout=10
set default=0
set theme=${gdisk_theme}

### Manual Font Size Override ###

submenu "Font Size Override (Manual)" {
    menuentry "40pt (Minimum)" {
        set theme=/boot/grub/theme/theme.cfg
        echo "Font set to 40pt - Default"
        sleep 2
        configfile /boot/grub/system.cfg
    }
    
    menuentry "48pt (Large)" {
        set theme=/boot/grub/theme/theme-48.cfg
        echo "Font set to 48pt - Large"
        sleep 2
        configfile /boot/grub/system.cfg
    }
    
    menuentry "56pt (Very Large)" {
        set theme=/boot/grub/theme/theme-56.cfg
        echo "Font set to 56pt - Very Large"
        sleep 2
        configfile /boot/grub/system.cfg
    }
    
    menuentry "64pt (Massive)" {
        set theme=/boot/grub/theme/theme-64.cfg
        echo "Font set to 64pt - Massive"
        sleep 2
        configfile /boot/grub/system.cfg
    }
    
    menuentry "72pt (Maximum)" {
        set theme=/boot/grub/theme/theme-72.cfg
        echo "Font set to 72pt - Maximum"
        sleep 2
        configfile /boot/grub/system.cfg
    }
    
    menuentry "[←] Back" {
        configfile /boot/grub/system.cfg
    }
}

### Universal Boot Entries (Available in both BIOS and UEFI) ###

if [ "${grub_platform}" = "efi" ]; then
    menuentry "Local EFI Boot" {
        configfile /boot/grub/boot-local-efi.cfg
    }
fi

menuentry "Gdisk Info"{
  echo ""
  echo ""
  echo ""
  echo "" 
  echo ""
  echo Gdisk v3.0 - Portable Computing
  echo ""
  echo Forked Grub2 Multibooter Utility
  echo ""
  echo https://github.com/glitchlinux/gdisk.git
  echo ""
  echo Gdisk version: 3.0 - Maintainer: Glitch Linux
  echo ""
  echo Disclaimer: Gdisk comes with ABSOLUTELY NO WARRANTY
  sleep 30
  echo ""
  echo ""
  echo ""
  echo ""
  echo ""
}

menuentry "Shutdown" {
    halt
}

menuentry "Reboot" {
    reboot
}

menuentry "[←]" {
    configfile /boot/grub/grub.cfg
}
